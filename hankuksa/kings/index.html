<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>왕 업적 연도표</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1a0dab;
  --url:#0d652d;
  --text:#202124;
  --body:#4d5156;
  --muted:#70757a;
  --line:#dadce0;
  --chip:#f1f3f4;
  --mark:#245c6f;
  --mark-soft:#e8f2f4;
  --font:Roboto,'Noto Sans KR','Malgun Gothic',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#fff;color:var(--text);font-family:var(--font);font-size:14px}
button,input,a{font:inherit}
a{color:inherit;text-decoration:none}

.search-header{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line)}
.header-inner{display:grid;grid-template-columns:44px minmax(0,720px) auto;gap:12px;align-items:center;padding:12px 24px 10px}
.back{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;border:1px solid transparent;background:#fff;color:#3c4043;font-size:22px;font-weight:700;line-height:1}
.back:hover{background:#f1f3f4}
.search-wrap{min-width:0}
.search-box{display:flex;align-items:center;width:100%;height:44px;border:1px solid #dfe1e5;border-radius:24px;background:#fff;box-shadow:0 1px 6px rgba(32,33,36,.16)}
.search{width:100%;height:100%;border:0;outline:0;background:transparent;color:var(--text);font-size:15px;padding:0 18px}
.search-icon{display:inline-flex;align-items:center;justify-content:center;width:44px;color:#5f6368;font-size:16px;flex-shrink:0}
.top-actions{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.nav-button,.count-badge{display:inline-flex;align-items:center;justify-content:center;height:34px;border-radius:17px;white-space:nowrap;font-size:13px;font-weight:700}
.nav-button{border:1px solid #dadce0;background:#fff;color:#3c4043;padding:0 13px}
.nav-button:hover{background:#f8fafd}
.count-badge{background:var(--mark-soft);color:#173c4c;padding:0 13px}

.filters{max-width:920px;margin-left:80px;padding:0 24px 12px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{height:34px;border:1px solid #dadce0;background:#fff;color:#3c4043;border-radius:17px;padding:0 14px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.chip:hover{background:#f8fafd}
.chip.active{background:#e8f0fe;border-color:#d2e3fc;color:#174ea6;font-weight:700}

.results-shell{display:grid;grid-template-columns:minmax(0,760px);padding:14px 24px 48px;margin-left:80px}
.result-info{color:var(--muted);font-size:13px;margin-bottom:12px;padding-bottom:2px}
.list{display:flex;flex-direction:column}
.achievement-row{position:relative;display:grid;grid-template-columns:92px minmax(0,1fr);column-gap:18px;padding:0 0 30px}
.achievement-row::before{content:'';position:absolute;left:35px;top:70px;bottom:4px;width:2px;background:linear-gradient(180deg,var(--dynasty-soft,#e5e8eb),#e5e8eb)}
.list>:last-child::before{display:none}
.marker{position:relative;display:flex;align-items:flex-start;justify-content:center;padding-top:2px}
.year-circle{display:flex;align-items:center;justify-content:center;width:70px;height:70px;border:3px solid var(--dynasty,#245c6f);border-radius:50%;background:#fff;color:var(--dynasty-ink,#173c4c);font-size:15px;font-weight:800;line-height:1.12;text-align:center;padding:8px;word-break:keep-all;box-shadow:0 0 0 6px var(--dynasty-soft,#e8f2f4)}
.result{min-width:0;padding:0 0 2px}
.site-row{display:flex;align-items:center;gap:10px;margin-bottom:4px;min-width:0}
.favicon{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--dynasty-soft,#eef6e8);color:var(--dynasty-ink,#41602f);border:1px solid var(--dynasty-soft,#dadce0);font-size:12px;font-weight:800;flex-shrink:0}
.site-meta{display:flex;flex-direction:column;gap:1px;min-width:0}
.site-name{font-size:13px;color:#202124;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.site-url{font-size:12px;color:#4d5156;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dots{margin-left:auto;color:#5f6368;font-size:18px;line-height:1;padding:0 4px;flex-shrink:0}
.result-title{display:inline;color:var(--blue);font-size:20px;font-weight:400;line-height:1.3;word-break:keep-all}
.result-title:hover{text-decoration:underline}
.snippet{color:var(--body);font-size:13.5px;line-height:1.58;margin-top:3px;word-break:keep-all}
.mnemonic{display:flex;align-items:center;gap:7px;margin-top:6px;color:#3c4043;font-size:12.5px;line-height:1.45;word-break:keep-all}
.mnemonic-label{display:inline-flex;align-items:center;min-height:20px;border-radius:999px;background:var(--dynasty-soft,#e8f2f4);color:var(--dynasty-ink,#173c4c);font-size:11px;font-weight:800;padding:2px 7px;white-space:nowrap}
.mnemonic-text strong{font-weight:800;color:var(--dynasty-ink,#173c4c)}
.meta-line{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-top:8px}
.pill{display:inline-flex;align-items:center;min-height:23px;border-radius:999px;background:var(--chip);color:#4d5156;font-size:12px;font-weight:500;padding:3px 8px;line-height:1.2}
.pill-main{background:var(--dynasty-soft,#e8f2f4);color:var(--dynasty-ink,#173c4c);font-weight:700}
.lesson-link{display:inline-flex;align-items:center;color:#1a73e8;font-size:13px;font-weight:500;margin-top:8px}
.lesson-link:hover{text-decoration:underline}
.flow-note{position:relative;display:grid;grid-template-columns:92px minmax(0,1fr);column-gap:18px;padding:0 0 30px}
.flow-note::before{content:'';position:absolute;left:35px;top:0;bottom:4px;width:2px;background:linear-gradient(180deg,var(--dynasty-soft,#e5e8eb),#e5e8eb)}
.flow-marker{display:flex;justify-content:center;padding-top:4px}
.flow-dot{width:16px;height:16px;border-radius:50%;background:#fff;border:3px solid var(--dynasty,#6d5cae);box-shadow:0 0 0 6px var(--dynasty-soft,#f0edfb)}
.flow-result{min-width:0;padding:0 0 2px}
.flow-label{display:inline-flex;align-items:center;min-height:22px;border-radius:999px;background:var(--dynasty-soft,#f0edfb);color:var(--dynasty-ink,#463880);font-size:12px;font-weight:800;padding:3px 8px;margin-bottom:5px}
.flow-title{color:#202124;font-size:16px;font-weight:700;line-height:1.35;word-break:keep-all}
.flow-text{color:var(--body);font-size:13.5px;line-height:1.62;margin-top:5px;word-break:keep-all}
.empty{display:none;color:var(--muted);font-size:14px;padding:50px 0}
.empty.show{display:block}

.dynasty-goguryeo{--dynasty:#245c6f;--dynasty-soft:#e8f2f4;--dynasty-ink:#173c4c}
.dynasty-baekje{--dynasty:#b95f3e;--dynasty-soft:#fbede6;--dynasty-ink:#7a331f}
.dynasty-silla{--dynasty:#b58a1e;--dynasty-soft:#fff4cf;--dynasty-ink:#6c4e00}
.dynasty-unified-silla{--dynasty:#4f7f62;--dynasty-soft:#e8f4ec;--dynasty-ink:#315c43}
.dynasty-balhae{--dynasty:#6d5cae;--dynasty-soft:#f0edfb;--dynasty-ink:#463880}
.dynasty-goryeo{--dynasty:#2f6db3;--dynasty-soft:#e8f0fb;--dynasty-ink:#214f86}
.dynasty-joseon{--dynasty:#7c5a3a;--dynasty-soft:#f2ece5;--dynasty-ink:#56381f}
.dynasty-daehan{--dynasty:#8a4f7d;--dynasty-soft:#f6eaf4;--dynasty-ink:#613356}

@media(max-width:900px){
  .header-inner{grid-template-columns:40px minmax(0,1fr);padding:10px 14px 8px}
  .top-actions{grid-column:2;justify-content:flex-start}
  .nav-button,.count-badge{height:30px;font-size:12px;padding:0 11px}
  .filters,.results-shell{margin-left:0;padding-left:14px;padding-right:14px}
}

@media(max-width:560px){
  .header-inner{grid-template-columns:34px minmax(0,1fr);gap:8px}
  .back{width:34px;height:34px;font-size:20px}
  .search-box{height:40px}
  .search{font-size:14px;padding:0 12px}
  .search-icon{width:36px}
  .filters{padding-bottom:10px}
  .chip{height:31px;font-size:12px;padding:0 11px}
  .results-shell{padding-top:12px}
  .achievement-row{grid-template-columns:72px minmax(0,1fr);column-gap:12px;padding-bottom:28px}
  .achievement-row::before{left:29px;top:62px}
  .year-circle{width:58px;height:58px;font-size:13px;border-width:2px;box-shadow:0 0 0 5px var(--dynasty-soft,#e8f2f4)}
  .flow-note{grid-template-columns:72px minmax(0,1fr);column-gap:12px;padding-bottom:28px}
  .flow-note::before{left:29px}
  .site-row{gap:8px}
  .favicon{width:25px;height:25px;font-size:11px}
  .result-title{font-size:18px}
  .flow-title{font-size:15px}
  .snippet{font-size:13px;line-height:1.55}
  .flow-text{font-size:13px;line-height:1.58}
  .count-badge{display:none}
}

@media(max-width:380px){
  .achievement-row{grid-template-columns:62px minmax(0,1fr);column-gap:10px}
  .achievement-row::before{left:25px}
  .flow-note{grid-template-columns:62px minmax(0,1fr);column-gap:10px}
  .flow-note::before{left:25px}
  .year-circle{width:52px;height:52px;font-size:12px}
}
</style>
</head>
<body>
<header class="search-header">
  <div class="header-inner">
    <a class="back" href="../" aria-label="한국사 목록으로">←</a>
    <div class="search-wrap">
      <div class="search-box">
        <input class="search" id="search" type="search" value="왕 업적 연도표" aria-label="왕, 업적, 키워드 검색" autocomplete="off">
        <span class="search-icon" aria-hidden="true">⌕</span>
      </div>
    </div>
    <div class="top-actions">
      <a class="nav-button" href="../timeline/">통합 연표</a>
      <div class="count-badge" id="count-badge">0개 업적</div>
    </div>
  </div>
  <section class="filters" aria-label="왕 업적 필터">
    <div class="chips" id="chips">
      <button type="button" class="chip active" data-dynasty="all">전체</button>
      <button type="button" class="chip" data-dynasty="고구려">고구려</button>
      <button type="button" class="chip" data-dynasty="백제">백제</button>
      <button type="button" class="chip" data-dynasty="신라">신라</button>
      <button type="button" class="chip" data-dynasty="통일신라">통일신라</button>
      <button type="button" class="chip" data-dynasty="발해">발해</button>
      <button type="button" class="chip" data-dynasty="고려">고려</button>
      <button type="button" class="chip" data-dynasty="조선">조선</button>
      <button type="button" class="chip" data-dynasty="대한제국">대한제국</button>
    </div>
  </section>
</header>

<main class="results-shell">
  <div class="result-info" id="result-info">검색 결과를 불러오는 중</div>
  <div class="list" id="list"></div>
  <div class="empty" id="empty">검색 결과가 없습니다.</div>
</main>

<script>
const list = document.getElementById('list');
const search = document.getElementById('search');
const chips = document.getElementById('chips');
const countBadge = document.getElementById('count-badge');
const resultInfo = document.getElementById('result-info');
const empty = document.getElementById('empty');
let achievements = [];
let flowNotes = [];
let activeDynasty = 'all';

const DYNASTY_CLASSES = {
  '고구려':'dynasty-goguryeo',
  '백제':'dynasty-baekje',
  '신라':'dynasty-silla',
  '통일신라':'dynasty-unified-silla',
  '발해':'dynasty-balhae',
  '고려':'dynasty-goryeo',
  '조선':'dynasty-joseon',
  '대한제국':'dynasty-daehan'
};

function escHtml(value) {
  return String(value || '').replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
}

function queryValue() {
  const value = search.value.trim();
  return value === '왕 업적 연도표' ? '' : value.toLowerCase();
}

function queryMatches(text, query) {
  if (!query) return true;
  const compactText = text.replace(/\s+/g, '');
  const compactQuery = query.replace(/\s+/g, '');
  if (text.includes(query) || compactText.includes(compactQuery)) return true;
  return query.split(/\s+/).filter(Boolean).every(token => {
    const stem = token.replace(/[이가은는을를에의]$/u, '');
    return text.includes(token) || text.includes(stem) || compactText.includes(stem.replace(/\s+/g, ''));
  });
}

function searchableText(item) {
  return [
    item.year,
    item.dynasty,
    item.period,
    item.king,
    item.title,
    item.achievement,
    item.mnemonic,
    item.category,
    ...(item.keywords || [])
  ].join(' ').toLowerCase();
}

function searchableFlowText(note) {
  return [
    note.label,
    note.title,
    note.body,
    ...(note.dynasties || []),
    ...(note.tags || [])
  ].join(' ').toLowerCase();
}

function dynastyClass(item) {
  return DYNASTY_CLASSES[item.dynasty] || '';
}

function flowNoteClass(note) {
  const dynasty = note.colorDynasty || (note.dynasties || [])[0];
  return DYNASTY_CLASSES[dynasty] || '';
}

function matchesActiveDynasty(value) {
  return activeDynasty === 'all' || value === activeDynasty;
}

function noteMatches(note, query) {
  const dynasties = note.dynasties || [];
  const dynastyMatch = activeDynasty === 'all' || dynasties.includes(activeDynasty);
  const queryMatch = queryMatches(searchableFlowText(note), query);
  return dynastyMatch && queryMatch;
}

function flowNoteHtml(note) {
  return `
    <section class="flow-note ${escHtml(flowNoteClass(note))}" aria-label="${escHtml(note.title)}">
      <div class="flow-marker" aria-hidden="true"><span class="flow-dot"></span></div>
      <div class="flow-result">
        <span class="flow-label">${escHtml(note.label || '흐름 정리')}</span>
        <div class="flow-title">${escHtml(note.title)}</div>
        <p class="flow-text">${formatMnemonic(note.body)}</p>
      </div>
    </section>
  `;
}

function formatMnemonic(value) {
  return String(value || '')
    .split('**')
    .map((part, index) => index % 2 ? `<strong>${escHtml(part)}</strong>` : escHtml(part))
    .join('')
    .replace(/\n/g, '<br>');
}

function achievementHtml(item) {
  const mnemonic = item.mnemonic ? `
        <div class="mnemonic">
          <span class="mnemonic-label">외우는법</span>
          <span class="mnemonic-text">${formatMnemonic(item.mnemonic)}</span>
        </div>
  ` : '';
  return `
    <article class="achievement-row ${escHtml(dynastyClass(item))}">
      <div class="marker" aria-hidden="true">
        <div class="year-circle">${escHtml(item.year)}</div>
      </div>
      <div class="result">
        <div class="site-row">
          <span class="favicon">${escHtml(item.dynasty.slice(0, 1))}</span>
          <span class="site-meta">
            <span class="site-name">aingan-study · ${escHtml(item.dynasty)} · ${escHtml(item.king)}</span>
            <span class="site-url">https://aingan.study › hankuksa › kings › ${escHtml(item.id)}</span>
          </span>
          <span class="dots" aria-hidden="true">⋮</span>
        </div>
        <a class="result-title" href="${escHtml(encodeURI(item.href))}">${escHtml(item.king)} - ${escHtml(item.title)}</a>
        <p class="snippet">${escHtml(item.achievement)}</p>
        ${mnemonic}
        <div class="meta-line">
          <span class="pill pill-main">${escHtml(item.category)}</span>
          ${(item.keywords || []).slice(0, 6).map(keyword => `<span class="pill">${escHtml(keyword)}</span>`).join('')}
        </div>
        <a class="lesson-link" href="${escHtml(encodeURI(item.href))}">관련 단원으로 이동</a>
      </div>
    </article>
  `;
}

function render() {
  const query = queryValue();
  const sortedItems = achievements
    .slice()
    .sort((a, b) => Number(a.sort) - Number(b.sort) || String(a.id).localeCompare(String(b.id), 'ko'));

  let visibleAchievements = 0;
  let visibleNotes = 0;
  const html = [];

  sortedItems.forEach(item => {
    const notes = flowNotes
      .filter(note => note.insertBeforeId === item.id)
      .filter(note => noteMatches(note, query));
    visibleNotes += notes.length;
    html.push(...notes.map(flowNoteHtml));

    const itemVisible = matchesActiveDynasty(item.dynasty) && queryMatches(searchableText(item), query);
    if (itemVisible) {
      visibleAchievements += 1;
      html.push(achievementHtml(item));
    }
  });

  list.innerHTML = html.join('');

  countBadge.textContent = `${visibleAchievements}개 업적`;
  resultInfo.textContent = `${visibleAchievements.toLocaleString('ko-KR')}개 업적 · ${visibleNotes.toLocaleString('ko-KR')}개 흐름`;
  empty.classList.toggle('show', visibleAchievements + visibleNotes === 0);
}

chips.addEventListener('click', event => {
  const button = event.target.closest('.chip');
  if (!button) return;
  chips.querySelectorAll('.chip').forEach(chip => chip.classList.remove('active'));
  button.classList.add('active');
  activeDynasty = button.dataset.dynasty;
  render();
});

search.addEventListener('focus', () => {
  if (search.value.trim() === '왕 업적 연도표') search.select();
});

search.addEventListener('input', render);

function loadJson(url, fallback) {
  return fetch(url)
    .then(response => {
      if (!response.ok) {
        if (fallback !== undefined) return fallback;
        throw new Error('JSON load failed');
      }
      return response.json();
    })
    .catch(error => {
      if (fallback !== undefined) return fallback;
      throw error;
    });
}

Promise.all([
  loadJson('../data/royal-achievements.json'),
  loadJson('../data/royal-flow-notes.json', [])
])
  .then(response => {
    const [data, notes] = response;
    achievements = Array.isArray(data) ? data : [];
    flowNotes = Array.isArray(notes) ? notes : [];
    render();
  })
  .catch(() => {
    list.innerHTML = '';
    countBadge.textContent = '0개 업적';
    resultInfo.textContent = '검색 결과를 불러오지 못했습니다.';
    empty.textContent = '왕 업적 데이터를 불러오지 못했습니다.';
    empty.classList.add('show');
  });
</script>
</body>
</html>
