<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>왕 업적 연도표</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f7fb;
  --panel:#ffffff;
  --ink:#1f2528;
  --muted:#647178;
  --line:#d9e0e5;
  --primary:#245c6f;
  --primary-dark:#173c4c;
  --accent:#c96b4a;
  --soft:#e8f2f4;
  --shadow:0 12px 28px rgba(31,37,40,.08);
  --font:Roboto,'Noto Sans KR','Malgun Gothic',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:var(--bg);color:var(--ink);font-family:var(--font)}
button,input,a{font:inherit}
a{color:inherit;text-decoration:none}

.topbar{background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:.78rem;padding:.72rem 1.1rem;position:sticky;top:0;z-index:20}
.back{display:inline-flex;align-items:center;justify-content:center;width:2.15rem;height:2.15rem;border-radius:.55rem;border:1px solid #d8e0e6;color:var(--primary);background:#fff;font-size:1.2rem;font-weight:800;line-height:1;transition:background .15s,border-color .15s}
.back:hover{background:#eef6f8;border-color:#9cc1ca}
.title-wrap{min-width:0;flex:1}
.title{font-size:1.08rem;font-weight:800;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.subline{font-size:.75rem;color:var(--muted);line-height:1.2;margin-top:.12rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-actions{display:flex;align-items:center;gap:.45rem;flex-shrink:0}
.nav-button,.count-badge{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;font-size:.78rem;font-weight:800;white-space:nowrap}
.nav-button{height:2.05rem;padding:0 .72rem;border:1px solid #bfd0d8;background:#fff;color:var(--primary-dark)}
.nav-button:hover{background:#eef6f8;border-color:#9cc1ca}
.count-badge{height:2.05rem;padding:0 .72rem;background:var(--soft);color:var(--primary-dark)}

.controls{background:rgba(246,247,251,.96);border-bottom:1px solid var(--line);padding:.78rem 1rem}
.control-inner{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:minmax(210px,270px) minmax(0,1fr);gap:.7rem;align-items:start}
.search{width:100%;height:2.62rem;border:1.5px solid #cad7de;border-radius:.7rem;background:#fff;color:var(--ink);padding:0 .92rem;font-size:.94rem;outline:none;box-shadow:0 1px 2px rgba(31,37,40,.03)}
.search:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(36,92,111,.12)}
.chips{min-width:0;display:flex;flex-wrap:wrap;gap:.4rem}
.chip{border:1.5px solid #bfd0d8;background:#fff;color:#40545d;border-radius:999px;padding:.52rem .78rem;font-size:.78rem;font-weight:800;cursor:pointer;white-space:nowrap;transition:background .15s,border-color .15s,color .15s}
.chip:hover{border-color:var(--primary);color:var(--primary-dark)}
.chip.active{background:var(--primary);border-color:var(--primary);color:#fff}

.content{max-width:1180px;margin:0 auto;padding:1.35rem 1rem 3rem}
.list{display:grid;gap:.78rem}
.achievement-card{display:grid;grid-template-columns:7.4rem minmax(0,1fr);gap:.9rem;background:var(--panel);border:1px solid #dce4e8;border-left:5px solid var(--primary);border-radius:.7rem;padding:.92rem 1rem;box-shadow:0 7px 18px rgba(31,37,40,.055);transition:transform .15s,border-color .15s,box-shadow .15s}
.achievement-card:hover{transform:translateY(-2px);border-color:#9fc3cb;border-left-color:var(--accent);box-shadow:var(--shadow)}
.year{font-size:1rem;font-weight:800;color:var(--primary-dark);line-height:1.25;word-break:keep-all}
.meta{display:flex;flex-wrap:wrap;gap:.34rem;margin-bottom:.46rem}
.tag{display:inline-flex;align-items:center;border-radius:999px;padding:.2rem .54rem;background:#edf4f6;color:var(--primary-dark);font-size:.72rem;font-weight:800;line-height:1.2}
.tag-dynasty{background:#e8f2ee;color:#315c43}
.tag-king{background:#eef6e8;color:#41602f}
.tag-category{background:#f8f0e8;color:#87553b}
.card-title{font-size:1.02rem;font-weight:800;line-height:1.42;margin-bottom:.28rem;word-break:keep-all}
.achievement{font-size:.9rem;line-height:1.65;color:#4e5b61;word-break:keep-all}
.keywords{display:flex;flex-wrap:wrap;gap:.28rem;margin-top:.62rem}
.keywords span{display:inline-flex;align-items:center;border-radius:999px;background:#f1f4f6;color:#5a6870;padding:.16rem .46rem;font-size:.69rem;font-weight:700;line-height:1.25}
.lesson-link{display:inline-flex;align-items:center;margin-top:.7rem;color:var(--primary);font-size:.78rem;font-weight:800}
.lesson-link:hover{text-decoration:underline}
.empty{display:none;text-align:center;padding:4rem 1rem;color:var(--muted);font-size:.95rem}
.empty.show{display:block}

@media(max-width:820px){
  .topbar{padding:.66rem .78rem;gap:.55rem}
  .title{font-size:1rem}
  .subline{display:none}
  .top-actions{gap:.34rem}
  .nav-button,.count-badge{height:1.9rem;padding:0 .55rem;font-size:.72rem}
  .controls{padding:.66rem .78rem}
  .control-inner{grid-template-columns:1fr;gap:.55rem}
  .chip{padding:.46rem .68rem;font-size:.74rem}
  .content{padding:1rem .78rem 2.4rem}
  .achievement-card{grid-template-columns:1fr;gap:.45rem;padding:.86rem .88rem;border-radius:.65rem}
  .year{font-size:.95rem}
  .card-title{font-size:.96rem}
  .achievement{font-size:.86rem;line-height:1.6}
}

@media(max-width:430px){
  .count-badge{display:none}
}
</style>
</head>
<body>
<header class="topbar">
  <a class="back" href="../" aria-label="한국사 목록으로">←</a>
  <div class="title-wrap">
    <h1 class="title">왕 업적 연도표</h1>
    <div class="subline">한능검 심화 기준: 왕별 업적을 국가 구분 없이 연도순 정렬</div>
  </div>
  <div class="top-actions">
    <a class="nav-button" href="../timeline/">통합 연표</a>
    <div class="count-badge" id="count-badge">0개 업적</div>
  </div>
</header>

<section class="controls" aria-label="왕 업적 필터">
  <div class="control-inner">
    <input class="search" id="search" type="search" placeholder="왕, 업적, 키워드 검색" autocomplete="off">
    <div class="chips" id="chips">
      <button type="button" class="chip active" data-dynasty="all">전체</button>
      <button type="button" class="chip" data-dynasty="고구려">고구려</button>
      <button type="button" class="chip" data-dynasty="백제">백제</button>
      <button type="button" class="chip" data-dynasty="신라">신라</button>
      <button type="button" class="chip" data-dynasty="통일신라">통일신라</button>
      <button type="button" class="chip" data-dynasty="발해">발해</button>
      <button type="button" class="chip" data-dynasty="고려">고려</button>
      <button type="button" class="chip" data-dynasty="조선">조선</button>
    </div>
  </div>
</section>

<main class="content">
  <div class="list" id="list"></div>
  <div class="empty" id="empty">검색 결과가 없습니다.</div>
</main>

<script>
const list = document.getElementById('list');
const search = document.getElementById('search');
const chips = document.getElementById('chips');
const countBadge = document.getElementById('count-badge');
const empty = document.getElementById('empty');
let achievements = [];
let activeDynasty = 'all';

function escHtml(value) {
  return String(value || '').replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
}

function searchableText(item) {
  return [
    item.year,
    item.dynasty,
    item.period,
    item.king,
    item.title,
    item.achievement,
    item.category,
    ...(item.keywords || [])
  ].join(' ').toLowerCase();
}

function render() {
  const query = search.value.trim().toLowerCase();
  const items = achievements
    .slice()
    .sort((a, b) => Number(a.sort) - Number(b.sort) || String(a.id).localeCompare(String(b.id), 'ko'))
    .filter(item => activeDynasty === 'all' || item.dynasty === activeDynasty)
    .filter(item => !query || searchableText(item).includes(query));

  list.innerHTML = items.map(item => `
    <article class="achievement-card">
      <div class="year">${escHtml(item.year)}</div>
      <div>
        <div class="meta">
          <span class="tag tag-dynasty">${escHtml(item.dynasty)}</span>
          <span class="tag tag-king">${escHtml(item.king)}</span>
          <span class="tag tag-category">${escHtml(item.category)}</span>
        </div>
        <h2 class="card-title">${escHtml(item.title)}</h2>
        <p class="achievement">${escHtml(item.achievement)}</p>
        <div class="keywords">${(item.keywords || []).map(keyword => `<span>${escHtml(keyword)}</span>`).join('')}</div>
        <a class="lesson-link" href="${escHtml(encodeURI(item.href))}">관련 단원으로 이동</a>
      </div>
    </article>
  `).join('');

  countBadge.textContent = `${items.length}개 업적`;
  empty.classList.toggle('show', items.length === 0);
}

chips.addEventListener('click', event => {
  const button = event.target.closest('.chip');
  if (!button) return;
  chips.querySelectorAll('.chip').forEach(chip => chip.classList.remove('active'));
  button.classList.add('active');
  activeDynasty = button.dataset.dynasty;
  render();
});

search.addEventListener('input', render);

fetch('../data/royal-achievements.json')
  .then(response => {
    if (!response.ok) throw new Error('JSON load failed');
    return response.json();
  })
  .then(data => {
    achievements = Array.isArray(data) ? data : [];
    render();
  })
  .catch(() => {
    list.innerHTML = '';
    countBadge.textContent = '0개 업적';
    empty.textContent = '왕 업적 데이터를 불러오지 못했습니다.';
    empty.classList.add('show');
  });
</script>
</body>
</html>
