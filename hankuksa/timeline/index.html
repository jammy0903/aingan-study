<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>한국사 통합 연도표</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f7fb;
  --panel:#ffffff;
  --ink:#1f2528;
  --muted:#647178;
  --line:#d9e0e5;
  --spine:#245c6f;
  --spine-dark:#173c4c;
  --accent:#c96b4a;
  --green:#4f7f62;
  --gold:#b48738;
  --violet:#6d5cae;
  --shadow:0 12px 28px rgba(31,37,40,.08);
  --font:Roboto,'Noto Sans KR','Malgun Gothic',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--ink);display:flex;flex-direction:column}
button,input,a{font:inherit}
a{color:inherit;text-decoration:none}

.topbar{height:56px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:.85rem;padding:0 1.1rem;position:relative;z-index:30}
.back{display:inline-flex;align-items:center;justify-content:center;width:2.15rem;height:2.15rem;border-radius:.55rem;border:1px solid #d8e0e6;color:var(--spine);background:#fff;font-size:1.2rem;font-weight:800;line-height:1;transition:background .15s,border-color .15s}
.back:hover{background:#eef6f8;border-color:#9cc1ca}
.title-wrap{min-width:0;flex:1}
.title{font-size:1.08rem;font-weight:800;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:0}
.subline{font-size:.75rem;color:var(--muted);line-height:1.2;margin-top:.1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-actions{display:flex;align-items:center;gap:.45rem;flex-shrink:0}
.nav-button,.count-badge{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;font-size:.78rem;font-weight:800;white-space:nowrap}
.nav-button{height:2.05rem;padding:0 .72rem;border:1px solid #bfd0d8;background:#fff;color:var(--spine-dark)}
.nav-button:hover{background:#eef6f8;border-color:#9cc1ca}
.count-badge{height:2.05rem;padding:0 .72rem;background:#e8f2f4;color:var(--spine-dark)}

.controls{background:rgba(246,247,251,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:.72rem 1rem .78rem;position:relative;z-index:20}
.control-inner{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:minmax(210px,262px) minmax(0,1fr);gap:.75rem;align-items:start}
.search{width:100%;height:2.65rem;border:1.5px solid #cad7de;border-radius:.7rem;background:#fff;color:var(--ink);padding:0 .92rem;font-size:.94rem;outline:none;box-shadow:0 1px 2px rgba(31,37,40,.03)}
.search:focus{border-color:var(--spine);box-shadow:0 0 0 4px rgba(36,92,111,.12)}
.chips{min-width:0;display:flex;flex-wrap:wrap;gap:.4rem;max-width:100%}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;border:1.5px solid #bfd0d8;background:#fff;color:#40545d;border-radius:999px;padding:.52rem .78rem;font-size:.78rem;font-weight:800;cursor:pointer;white-space:nowrap;transition:background .15s,border-color .15s,color .15s}
.chip:hover{border-color:var(--spine);color:var(--spine-dark)}
.chip.active{background:var(--spine);border-color:var(--spine);color:#fff}

.timeline-viewport{flex:1;min-height:0;overflow:auto;overscroll-behavior:contain;scrollbar-color:#9fb6c0 transparent;cursor:grab}
.timeline-viewport.dragging{cursor:grabbing;user-select:none}
.timeline-viewport.dragging .event-card{pointer-events:none}
.timeline-canvas{position:relative;width:min(1180px,100%);margin:0 auto;padding:1.35rem 1.2rem 4rem}
.timeline-list{position:relative;display:flex;flex-direction:column;gap:.92rem;padding:.4rem 0}
.timeline-list::before{content:'';position:absolute;left:50%;top:.5rem;bottom:.5rem;width:7px;transform:translateX(-50%);border-radius:999px;background:linear-gradient(180deg,var(--spine),var(--green) 45%,var(--accent));box-shadow:0 0 0 7px rgba(36,92,111,.08)}
.event{position:relative;display:grid;grid-template-columns:minmax(0,1fr) 74px minmax(0,1fr);align-items:start;min-height:5.5rem}
.event:nth-child(odd) .event-card{grid-column:1;justify-self:end}
.event:nth-child(even) .event-card{grid-column:3;justify-self:start}
.event:nth-child(odd) .branch{grid-column:2;justify-self:start}
.event:nth-child(even) .branch{grid-column:2;justify-self:end}
.event-card{position:relative;width:min(100%,31rem);background:var(--panel);border:1px solid #dce4e8;border-radius:.7rem;padding:.92rem .98rem .88rem;box-shadow:0 7px 18px rgba(31,37,40,.06);transition:transform .15s,border-color .15s,box-shadow .15s}
.event-card:hover{transform:translateY(-2px);border-color:#9fc3cb;box-shadow:var(--shadow)}
.event-card:focus-visible{outline:3px solid rgba(36,92,111,.24);outline-offset:3px}
.event:nth-child(odd) .event-card{border-right:5px solid var(--spine)}
.event:nth-child(even) .event-card{border-left:5px solid var(--accent)}
.branch{position:relative;width:74px;height:5.5rem;grid-row:1;pointer-events:none}
.node{position:absolute;left:50%;top:1.95rem;width:1.18rem;height:1.18rem;border-radius:999px;background:#fff;border:4px solid var(--spine);transform:translateX(-50%);box-shadow:0 0 0 7px rgba(36,92,111,.12),0 8px 16px rgba(31,37,40,.12);z-index:2}
.arm{position:absolute;top:2.35rem;height:4px;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--spine));box-shadow:0 1px 0 rgba(255,255,255,.7) inset}
.event:nth-child(odd) .arm{left:0;right:50%}
.event:nth-child(even) .arm{left:50%;right:0}
.year-pill{position:absolute;top:.2rem;left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;justify-content:center;min-width:4.5rem;max-width:6.3rem;padding:.25rem .58rem;border-radius:999px;background:linear-gradient(135deg,var(--spine-dark),var(--spine));color:#fff;font-size:.72rem;font-weight:800;text-align:center;line-height:1.25;box-shadow:0 8px 16px rgba(36,92,111,.18);z-index:3}
.meta{display:flex;flex-wrap:wrap;gap:.34rem;margin-bottom:.5rem}
.tag{display:inline-flex;align-items:center;border-radius:999px;padding:.2rem .54rem;background:#edf4f6;color:var(--spine-dark);font-size:.72rem;font-weight:800;line-height:1.2}
.tag-country{background:#e8f2ee;color:#315c43}
.tag-century{background:#f8f0e8;color:#87553b}
.tag-era{background:#f7ecd9;color:#7d551b}
.tag-kind{background:#eef1fa;color:#564998}
.tag-ruler{background:#eef6e8;color:#41602f}
.event-title{font-size:1.02rem;font-weight:800;line-height:1.42;letter-spacing:0;color:#161b1d;margin-bottom:.32rem;word-break:keep-all}
.event-note{font-size:.9rem;line-height:1.65;color:#4e5b61;word-break:keep-all}
.keywords{display:flex;flex-wrap:wrap;gap:.28rem;margin-top:.62rem}
.keywords span{display:inline-flex;align-items:center;border-radius:999px;background:#f1f4f6;color:#5a6870;padding:.16rem .46rem;font-size:.69rem;font-weight:700;line-height:1.25}
.empty{display:none;text-align:center;padding:4rem 1rem;color:var(--muted);font-size:.95rem}
.empty.show{display:block}

.progress{position:fixed;left:0;right:0;bottom:0;height:4px;background:rgba(36,92,111,.12);z-index:40}
.progress-bar{height:100%;width:0;background:linear-gradient(90deg,var(--spine),var(--accent));transition:width .08s linear}

@media(max-width:820px){
  html,body{height:100%;overflow:hidden}
  body{min-height:100%}
  .topbar{height:58px;padding:0 .82rem}
  .title{font-size:1rem}
  .subline{display:none}
  .top-actions{gap:.34rem}
  .nav-button,.count-badge{height:1.9rem;padding:0 .55rem;font-size:.72rem}
  .controls{padding:.62rem .78rem .7rem}
  .control-inner{grid-template-columns:1fr;gap:.55rem}
  .timeline-viewport{height:auto;min-height:0;overflow:auto;cursor:auto}
  .timeline-canvas{padding:1rem .78rem 3.4rem}
  .timeline-list{gap:.8rem}
  .timeline-list::before{left:1.55rem;transform:none;width:6px}
  .event{grid-template-columns:3.5rem minmax(0,1fr);min-height:auto}
  .event:nth-child(odd) .branch,.event:nth-child(even) .branch{grid-column:1;justify-self:stretch}
  .event:nth-child(odd) .event-card,.event:nth-child(even) .event-card{grid-column:2;justify-self:stretch;width:100%;border-right:1px solid #dce4e8;border-left:5px solid var(--accent)}
  .branch{width:3.5rem;height:5.2rem}
  .node{left:1.55rem;top:1.82rem}
  .arm,.event:nth-child(odd) .arm,.event:nth-child(even) .arm{left:1.55rem;right:0;top:2.22rem}
  .year-pill{left:1.55rem;top:.1rem;min-width:3.7rem;max-width:4.8rem;font-size:.66rem;padding:.22rem .46rem}
  .event-card{padding:.85rem .86rem .82rem;border-radius:.65rem}
  .event-title{font-size:.96rem}
  .event-note{font-size:.86rem;line-height:1.6}
}
@media(max-width:430px){
  .count-badge{display:none}
}
</style>
</head>
<body>
<header class="topbar">

</section>

<main class="timeline-viewport" id="viewport">

</main>

<div class="progress" aria-hidden="true"><div class="progress-bar" id="progress-bar"></div></div>

const EVENTS = [
  {year:'약 70만 년 전',sort:-700000,era:'선사',kind:'생활',title:'구석기 시대 생활',note:'뗀석기, 이동 생활, 동굴·막집 생활이 한반도 선사 흐름의 출발점이 된다.',tags:['뗀석기','이동 생활','전곡리'],href:'../01/?q=구석기'},
  {year:'약 1만 년 전',sort:-10000,era:'선사',kind:'생활',title:'신석기 시대 시작',note:'간석기와 빗살무늬토기, 정착 생활과 초기 농경이 나타난다.',tags:['간석기','빗살무늬토기','정착'],href:'../01/?q=신석기'},
  {year:'기원전 2333',sort:-2333,era:'초기국가',kind:'정치',title:'단군조선 건국 전승',note:'고조선 건국 설화와 제정일치 사회를 통해 초기 국가 성격을 이해한다.',tags:['단군','고조선','제정일치'],href:'../01/?q=단군조선'},
  {year:'기원전 2000~1500',sort:-2000,era:'초기국가',kind:'사회',title:'청동기 문화 전개',note:'비파형 동검, 민무늬토기, 고인돌과 계급 사회가 함께 등장한다.',tags:['비파형동검','고인돌','계급'],href:'../01/?q=청동기'},
  {year:'기원전 5세기',sort:-500,era:'초기국가',kind:'문화',title:'철기 문화 보급',note:'철제 농기구와 무기, 세형동검·잔무늬거울, 중국 화폐와 붓이 출토된다.',tags:['철기','세형동검','다호리'],href:'../01/?q=철기'},
  {year:'기원전 194',sort:-194,era:'초기국가',kind:'정치',title:'위만조선 성립',note:'위만이 고조선의 왕이 되며 중계 무역과 철기 문화가 확대된다.',tags:['위만','중계 무역','철기'],href:'../01/?q=위만조선'},
  {year:'기원전 108',sort:-108,era:'초기국가',kind:'정치',title:'고조선 멸망과 한사군 설치',note:'한 무제의 공격으로 고조선이 멸망하고 한사군이 설치된다.',tags:['고조선 멸망','한사군','한 무제'],href:'../01/?q=고조선 멸망'},
  {year:'3~6세기',sort:42,era:'초기국가',kind:'연맹',country:'가야',title:'전기·후기 가야 연맹과 철 문화',note:'3세기경 김해의 금관가야가 낙랑군과 왜를 연결하는 중계무역으로 성장했다. 400년 고구려군의 공격 뒤 가야 연맹의 주도권이 약해지고, 5세기 후반부터 고령의 대가야가 후기 가야 연맹을 주도했으나 금관가야는 법흥왕, 대가야는 진흥왕 때 신라에 병합되었다.',tags:['가야','금관가야','대가야','김해','고령','낙랑군','왜','중계무역','400년','법흥왕','진흥왕'],href:'../01/?q=가야'},
  {year:'1~2세기',sort:100,era:'삼국·남북국',kind:'체제정비',title:'고구려의 중앙집권 기틀',note:'태조왕 때 계루부 고씨 왕위 세습과 옥저 복속으로 고구려 성장 기반이 마련된다.',tags:['태조왕','고구려','고씨세습','옥저 복속'],href:'../02/?q=고구려'},
  {year:'194',sort:194,era:'삼국·남북국',kind:'체제정비',title:'고국천왕의 체제 정비·진대법',note:'5부가 행정 구역 성격으로 바뀌고 부자 상속이 강화되며, 진대법으로 민생 안정책이 시행된다.',tags:['고국천왕','진대법','부자 상속'],href:'../02/?q=고구려'},
  {year:'3세기 중엽',sort:260,era:'삼국·남북국',kind:'체제정비',title:'고이왕의 백제 체제 정비',note:'백제가 한강 유역을 장악하고 관등·관복제를 정비하며 중앙집권 국가의 토대를 갖춘다.',tags:['고이왕','관등제','관복제'],href:'../02/?q=백제'},

  {year:'313',sort:313,era:'삼국·남북국',kind:'영토',title:'미천왕의 낙랑군 축출',note:'고구려 미천왕이 낙랑군을 축출하며 대동강 유역으로 세력을 넓힌다.',tags:['미천왕','낙랑군','대동강'],href:'../02/?q=미천왕'},
  {year:'314',sort:314,era:'삼국·남북국',kind:'영토',title:'미천왕의 대방군 점령',note:'낙랑군 축출에 이어 대방군까지 차지하면서 한반도 내 중국 군현 세력을 밀어낸다.',tags:['미천왕','대방군','군현 축출'],href:'../02/?q=미천왕'},
  {year:'346~375',sort:346,era:'삼국·남북국',kind:'전성기',title:'근초고왕의 백제 전성기',note:'마한 정복, 부자 상속제 확립, 고흥의 서기 편찬, 칠지도와 아직기·왕인 전승, 요서·산둥·규슈 방면 진출 키워드로 백제 전성기를 정리한다.',tags:['근초고왕','마한 정복','부자상속제','고흥','서기 편찬','칠지도','아직기','왕인','요서·산둥·규슈'],href:'../02/?q=근초고왕'},
  {year:'4세기 후반',sort:356,era:'삼국·남북국',kind:'체제정비',title:'내물마립간의 신라 성장',note:'박혁거세 건국 전승 이후 박·석·김 3성이 왕위를 교대로 잇던 흐름에서 내물마립간 이후 김씨 왕위 세습과 마립간 칭호가 굳어진다. 400년에는 광개토대왕의 도움으로 왜·가야 세력을 격퇴한다.',tags:['박혁거세','박·석·김','내물마립간','김씨 왕위 세습','마립간','광개토대왕','왜 격퇴'],href:'../02/?q=내물마립간'},
  {year:'371',sort:371,era:'삼국·남북국',kind:'전쟁',title:'백제의 평양성 공격',note:'근초고왕이 평양성을 공격하고 고구려 고국원왕이 전사한다.',tags:['근초고왕','고국원왕','평양성'],href:'../02/?q=근초고왕'},
  {year:'372',sort:372,era:'삼국·남북국',kind:'제도',ruler:'소수림왕',title:'고구려 태학 설립·불교 수용',note:'소수림왕이 태학을 세우고 전진에서 불교를 받아들여 국가 체제를 정비한다.',tags:['소수림왕','태학','불교'],href:'../02/?q=소수림왕'},
  {year:'373',sort:373,era:'삼국·남북국',kind:'제도',ruler:'소수림왕',title:'소수림왕의 율령 반포',note:'고구려가 율령을 반포해 왕권 중심의 중앙집권 체제를 강화한다.',tags:['소수림왕','율령','중앙집권'],href:'../02/?q=율령'},
  {year:'384',sort:384,era:'삼국·남북국',kind:'문화',title:'백제 불교 수용',note:'침류왕 때 동진의 승려 마라난타를 통해 불교가 수용된다.',tags:['침류왕','마라난타','불교'],href:'../02/?q=불교'},
  {year:'391',sort:391,era:'삼국·남북국',kind:'정치',title:'광개토대왕 즉위',note:'고구려의 정복 활동이 본격화되고 만주와 한반도 북부 지배력이 커진다.',tags:['광개토대왕','정복 활동','영락'],href:'../02/?q=광개토대왕'},
  {year:'427',sort:427,era:'삼국·남북국',kind:'정치',title:'장수왕의 평양 천도',note:'고구려가 평양으로 수도를 옮겨 남진 정책을 본격화한다.',tags:['장수왕','평양 천도','남진'],href:'../02/?q=장수왕'},
  {year:'433',sort:433,era:'삼국·남북국',kind:'외교',country:'백제·신라',title:'비유왕·눌지왕의 나제 동맹 성립',note:'고구려 남하에 대응해 백제 비유왕과 신라 눌지왕이 화친하며 나제 동맹을 형성한다.',tags:['비유왕','눌지왕','나제동맹','백제','신라'],href:'../02/?q=나제동맹'},
  {year:'475',sort:475,era:'삼국·남북국',kind:'전쟁',title:'한성 함락과 문주왕의 웅진 천도',note:'장수왕이 백제 한성을 공격해 개로왕이 전사하고, 문주왕이 웅진으로 천도해 백제 웅진 시대가 시작된다.',tags:['한성 함락','개로왕','문주왕','웅진 천도'],href:'../02/?q=문주왕'},
  {year:'493',sort:493,era:'삼국·남북국',kind:'외교',title:'동성왕의 혼인 동맹',note:'백제 동성왕이 신라 왕족의 딸을 왕비로 맞아 나제 동맹을 혼인 동맹으로 강화한다.',tags:['동성왕','혼인동맹','나제동맹','소지 마립간'],href:'../02/?q=동성왕'},
  {year:'501~523',sort:501,era:'삼국·남북국',kind:'체제정비',title:'무령왕의 22담로와 남조식 벽돌무덤',note:'무령왕은 왕족을 22담로에 보내 지방 통제를 강화하고, 무령왕릉은 중국 남조 양식의 벽돌무덤과 묘지석으로 백제 문화를 보여 준다.',tags:['무령왕','22담로','지방 통치','무령왕릉','벽돌무덤','중국 남조 양식'],href:'../02/?q=무령왕'},
  {year:'500~514',sort:503,era:'삼국·남북국',kind:'제도',title:'지증왕의 신라 체제 정비',note:'지증왕 때 순장 금지, 우경 실시, 동시전 설치, 국호 신라 확정과 왕 칭호 사용이 이루어진다. 이사부의 우산국 복속으로 동해 진출도 드러난다.',tags:['지증왕','순장 금지','우경','동시전','신라 국호','왕 칭호','이사부','우산국'],href:'../02/?q=지증왕'},
  {year:'514~540',sort:520,era:'삼국·남북국',kind:'제도',title:'법흥왕의 중앙집권 체제 정비',note:'법흥왕은 병부 설치, 율령 반포, 공복 제정, 골품제 정비, 건원 연호 사용으로 국가 체제를 강화한다. 이차돈의 순교를 계기로 불교를 공인하고, 532년 금관가야를 병합해 금관가야가 멸망한다.',tags:['법흥왕','병부 설치','율령 반포','공복 제정','골품제 정비','건원','불교 공인','이차돈','금관가야 병합','금관가야 멸망'],href:'../02/?q=법흥왕'},
  {year:'538',sort:538,era:'삼국·남북국',kind:'정치',title:'백제 사비 천도',note:'성왕이 사비로 천도하고 국호를 남부여로 바꾸며 중흥을 추진한다.',tags:['성왕','사비 천도','남부여'],href:'../02/?q=성왕'},
  {year:'540~576',sort:545,era:'삼국·남북국',kind:'전성기',title:'진흥왕의 신라 전성기',note:'진흥왕은 거칠부 등에게 국사를 편찬하게 하고 개국 연호를 사용한다. 백제와 함께 한강 상류를 차지한 뒤 백제가 회복한 한강 하류까지 차지해 나제동맹을 깨고, 화랑도를 정비하며 황룡사 건립을 시작한다. 단양 적성비와 4개 순수비는 영토 확장의 대표 사료이다.',tags:['진흥왕','거칠부','국사 편찬','개국','한강 유역','나제동맹 파기','화랑도','황룡사','단양 적성비','4개 순수비'],href:'../02/?q=진흥왕'},
  {year:'552',sort:552,era:'삼국·남북국',kind:'문화',title:'노리사치계의 일본 불교 전파',note:'성왕의 명으로 달솔 노리사치계가 불상과 불경을 일본에 전해 백제 불교 문화를 전파한다.',tags:['성왕','노리사치계','일본 불교 전파','불상','불경'],href:'../02/?q=성왕'},
  {year:'554',sort:554,era:'삼국·남북국',kind:'전쟁',title:'관산성 전투와 성왕 전사',note:'백제 성왕이 신라와의 관산성 전투에서 전사한다.',tags:['관산성','성왕','백제'],href:'../02/?q=성왕'},
  {year:'562',sort:562,era:'삼국·남북국',kind:'정치',title:'진흥왕의 대가야 병합',note:'진흥왕 때 신라가 대가야를 병합해 대가야가 멸망하고 가야 연맹의 독자 흐름이 끝난다.',tags:['진흥왕','대가야 병합','대가야 멸망','이사부','가야'],href:'../02/?q=대가야'},
  {year:'612',sort:612,era:'삼국·남북국',kind:'전쟁',country:'고구려',ruler:'영양왕',title:'살수대첩',note:'을지문덕이 우중문이 이끈 수의 별동대를 살수(청천강)로 유인해 크게 격파한다. 이 패배 뒤 수의 국력이 약화되어 618년 수가 멸망하고 당이 건국된다.',tags:['을지문덕','우중문','수','살수대첩','수 멸망','당 건국'],href:'../02/?q=살수대첩'},
  {year:'631~',sort:631,era:'삼국·남북국',kind:'군사',country:'고구려',ruler:'영류왕',title:'천리장성 축조 시작',note:'고구려가 당의 침입에 대비해 천리장성 축조를 시작한다. 642년부터 연개소문이 공사를 감독하며, 이후 대막리지 집권으로 이어진다.',tags:['천리장성','연개소문','당 침입 대비','영류왕'],href:'../02/?q=천리장성'},
  {year:'632',sort:632,era:'삼국·남북국',kind:'정치',title:'선덕여왕 즉위',note:'신라 최초의 여왕 즉위 이후 첨성대와 불교 문화가 중요해진다.',tags:['선덕여왕','첨성대','신라'],href:'../02/?q=첨성대'},
  {year:'642',sort:642,era:'삼국·남북국',kind:'전쟁',country:'백제·신라',ruler:'의자왕·선덕여왕',title:'의자왕의 대야성 함락',note:'백제 의자왕 때 장군 윤충이 선덕여왕의 신라 대야성을 함락한다. 김품석과 고타소가 죽어 김춘추의 고구려 원조 요청과 대당 외교의 직접 계기가 된다.',tags:['의자왕','선덕여왕','대야성 전투','윤충','김품석','고타소','김춘추'],href:'../02/?q=대야성'},
  {year:'642',sort:642.1,era:'삼국·남북국',kind:'정치',country:'고구려',ruler:'연개소문',title:'연개소문의 대막리지 집권',note:'연개소문이 정변으로 권력을 장악하고 대막리지로 집권한다. 이후 당 태종의 침입과 안시성 전투로 이어진다.',tags:['연개소문','대막리지','보장왕','영류왕'],href:'../02/?q=연개소문'},
  {year:'645',sort:645,era:'삼국·남북국',kind:'전쟁',country:'고구려',ruler:'보장왕',title:'안시성 전투',note:'당 태종이 고구려를 침입하지만 고구려가 안시성에서 막아낸다. 안시성 성주의 이름은 확실하지 않으며 양만춘은 후대 전승이다.',tags:['안시성','안시성 성주','양만춘(전승)','당 태종','연개소문'],href:'../02/?q=안시성'},
  {year:'648',sort:648,era:'삼국·남북국',kind:'외교',country:'신라·당',ruler:'김춘추',title:'김춘추의 나당동맹 체결',note:'김춘추가 고구려에 도움을 요청했으나 실패한 뒤 당에 동맹을 요청한다. 이 대당 외교가 나당동맹으로 이어져 백제·고구려 공격의 기반이 된다.',tags:['김춘추','나당동맹','대당 외교','고구려 원조 요청 실패'],href:'../02/?q=나당동맹'},
  {year:'660',sort:660,era:'삼국·남북국',kind:'정치',country:'백제',ruler:'의자왕',title:'백제 멸망',note:'나당연합군이 황산벌에서 계백의 결사대를 돌파하고 사비성을 함락해 백제가 멸망한다.',tags:['백제 멸망','나당연합','의자왕','계백','황산벌 전투','사비성 함락'],href:'../02/?q=백제 멸망'},
  {year:'660~663',sort:663,era:'삼국·남북국',kind:'부흥운동',country:'백제',title:'백제 부흥운동과 백강 전투',note:'흑치상지·복신·도침 등이 백제 부흥운동을 전개하고 왕자 부여풍을 추대한다. 왜의 지원군까지 왔지만 663년 백강 전투에서 나당연합군에게 패한다.',tags:['백제 부흥운동','흑치상지','복신','도침','부여풍','왜 지원','백강 전투'],href:'../02/?q=백강'},
  {year:'668',sort:668,era:'삼국·남북국',kind:'정치',country:'고구려',ruler:'보장왕',title:'고구려 멸망',note:'연개소문 사후 지배층이 분열된 가운데 나당연합군이 평양성을 함락해 고구려가 멸망한다.',tags:['고구려 멸망','나당연합','평양성','연개소문 사후 분열','보장왕'],href:'../02/?q=고구려 멸망'},
  {year:'668 이후',sort:668.1,era:'삼국·남북국',kind:'정치',country:'당',title:'당의 한반도 지배 야욕',note:'당은 고구려 옛 땅에 안동도호부, 백제 옛 땅에 웅진도독부, 신라에는 계림도독부를 두며 한반도 직접 지배를 시도한다.',tags:['안동도호부','웅진도독부','계림도독부','당','한반도 지배 야욕'],href:'../02/?q=안동도호부'},
  {year:'669~674',sort:670,era:'삼국·남북국',kind:'부흥운동',country:'고구려·신라',title:'고구려 부흥운동',note:'검모잠·고연무·안승 등이 고구려 부흥운동을 전개했고 신라가 이를 지원한다. 안승은 신라의 지원을 받아 금마저(익산)에서 보덕국으로 활동한다.',tags:['고구려 부흥운동','검모잠','고연무','안승','금마저','익산','신라 지원','보덕국'],href:'../02/?q=고구려 부흥운동'},
  {year:'675',sort:675,era:'삼국·남북국',kind:'전쟁',country:'신라·당',ruler:'문무왕',title:'매소성 전투',note:'나당전쟁 중 신라가 매소성 전투에서 당의 육군을 격파한다. 메소성으로 쓰는 경우가 있지만 표준 표기는 매소성이다.',tags:['매소성','메소성','나당전쟁','문무왕','신라 승리'],href:'../02/?q=매소성'},

function compact(value) {
  return String(value || '').replace(/\s+/g, '');
}

function termMatches(text, packed, term) {
  const raw = String(term || '');
  if (text.includes(raw)) return true;
  return /[\s·~]/.test(raw) && packed.includes(compact(raw));
}

function eventText(event) {
  return [event.year,event.era,event.kind,event.title,event.note,...(event.tags || [])].join(' ');
}

function countryLabels(event) {
  if (event.country) {
    const countries = Array.isArray(event.country) ? event.country : String(event.country).split('·');
    return countries.map(country => country.trim()).filter(Boolean);
  }
  const text = eventText(event);
  const packed = compact(text);
  const labels = COUNTRY_RULES
    .filter(rule => rule.terms.some(term => termMatches(text, packed, term)))
    .map(rule => rule.label);
  const uniqueLabels = [...new Set(labels)];
  const scopedLabels = uniqueLabels
    .filter(label => !uniqueLabels.some(other => other !== label && other.includes(label)));
  if (scopedLabels.length) return scopedLabels.slice(0, 2);
  if (event.era === '선사') return ['한반도'];
  if (event.era === '초기국가') return ['초기 국가'];
  if (event.era === '삼국·남북국') return ['삼국·남북국'];
  if (event.era === '후삼국') return ['후삼국'];
  if (event.era === '근대') return [event.sort >= 1897 ? '대한제국' : '조선'];
  if (event.era === '일제') return ['일제 강점기'];
  if (event.era === '현대') return ['대한민국'];
  return [event.era];
}

function countryLabel(event) {
  return countryLabels(event).join('·');
}

function rulerLabels(event) {
  if (event.ruler) {
    const rulers = Array.isArray(event.ruler) ? event.ruler : String(event.ruler).split('·');
    return rulers.map(ruler => ruler.trim()).filter(Boolean);
  }
  const text = eventText(event);
  const packed = compact(text);
  return [...new Set(RULER_RULES
    .filter(rule => rule.terms.some(term => termMatches(text, packed, term)))
    .map(rule => rule.label))].slice(0, 3);
}

function rulerLabel(event) {
  return rulerLabels(event).join('·');
}

function centuryFromYear(year) {
  if (year <= 0) return `기원전 ${Math.max(1, Math.ceil(Math.abs(year) / 100))}세기`;
  return `${Math.floor((Math.floor(year) - 1) / 100) + 1}세기`;
}

function centuryLabel(event) {
  const raw = String(event.year || '');
  const writtenCentury = raw.match(/(?:기원전\s*)?\d+(?:~\d+)?세기(?:\s*(?:전반|중엽|후반))?/);
  if (writtenCentury) return writtenCentury[0].replace(/\s+/g, ' ');
  const bceRange = raw.match(/기원전\s*(\d+)(?:~(\d+))?/);
  if (bceRange) {
    const first = Math.ceil(Number(bceRange[1]) / 100);
    const second = bceRange[2] ? Math.ceil(Number(bceRange[2]) / 100) : first;
    return first === second ? `기원전 ${first}세기` : `기원전 ${first}~${second}세기`;
  }
  const sort = Number(event.sort);
  if (!Number.isFinite(sort)) return '세기 미상';
  if (sort <= -10000) return '선사 시대';
  return centuryFromYear(sort);
}

function searchableText(event) {
  return [eventText(event),countryLabel(event),rulerLabel(event),centuryLabel(event)].join(' ').toLowerCase();
}

function matchesActiveEra(event) {
  return activeEra === 'all' || event.era === activeEra || countryLabels(event).includes(activeEra);
}

function render() {
  const query = search.value.trim().toLowerCase();
  const events = EVENTS
    .map((event, index) => ({...event,index}))
    .sort((a, b) => a.sort - b.sort || a.index - b.index)
    .filter(matchesActiveEra)
    .filter(event => !query || searchableText(event).includes(query));

  timeline.innerHTML = events.map(event => {
    const ruler = rulerLabel(event);
    return `
    <article class="event">
      <div class="branch" aria-hidden="true">
        <span class="year-pill">${escHtml(event.year)}</span>
        <span class="node"></span>
        <span class="arm"></span>
      </div>
      <a class="event-card" href="${escHtml(encodeURI(event.href))}" aria-label="${escHtml(event.year + ' ' + event.title)}">
        <div class="meta">
          <span class="tag tag-country">${escHtml(countryLabel(event))}</span>
          ${ruler ? `<span class="tag tag-ruler">${escHtml(ruler)}</span>` : ''}
          <span class="tag tag-century">${escHtml(centuryLabel(event))}</span>
          <span class="tag tag-era">${escHtml(event.era)}</span>
          <span class="tag tag-kind">${escHtml(event.kind)}</span>
        </div>
        <h2 class="event-title">${escHtml(event.title)}</h2>
        <p class="event-note">${escHtml(event.note)}</p>
        <div class="keywords">${(event.tags || []).map(tag => `<span>${escHtml(tag)}</span>`).join('')}</div>
      </a>
    </article>
  `}).join('');

  countBadge.textContent = `${events.length}개 사건`;
  empty.classList.toggle('show', events.length === 0);
  updateProgress();
}

document.getElementById('chips').addEventListener('click', event => {
  const button = event.target.closest('.chip');
  if (!button) return;
  document.querySelectorAll('.chip').forEach(chip => chip.classList.remove('active'));
  button.classList.add('active');
  activeEra = button.dataset.era;
  viewport.scrollTop = 0;
  render();
});

search.addEventListener('input', render);

function updateProgress() {
  const max = viewport.scrollHeight - viewport.clientHeight;
  const ratio = max > 0 ? viewport.scrollTop / max : 0;
  progressBar.style.width = `${Math.max(0, Math.min(1, ratio)) * 100}%`;
}

viewport.addEventListener('scroll', updateProgress, {passive:true});

viewport.addEventListener('pointerdown', event => {
  if (event.pointerType !== 'mouse' || event.button !== 0) return;
  dragState = {
    id:event.pointerId,
    startY:event.clientY,
    startX:event.clientX,
    scrollTop:viewport.scrollTop,
    moved:false
  };
  viewport.classList.add('dragging');
  viewport.setPointerCapture(event.pointerId);
});

viewport.addEventListener('pointermove', event => {
  if (!dragState || dragState.id !== event.pointerId) return;
  const dy = event.clientY - dragState.startY;
  const dx = event.clientX - dragState.startX;
  if (Math.abs(dy) > 4 || Math.abs(dx) > 4) dragState.moved = true;
  viewport.scrollTop = dragState.scrollTop - dy;
});

function endDrag(event) {
  if (!dragState || dragState.id !== event.pointerId) return;
  suppressClick = dragState.moved;
  viewport.classList.remove('dragging');
  dragState = null;
  if (suppressClick) {
    window.setTimeout(() => {
      suppressClick = false;
    }, 120);
  }
}

viewport.addEventListener('pointerup', endDrag);
viewport.addEventListener('pointercancel', endDrag);

viewport.addEventListener('click', event => {
  if (!suppressClick) return;
  event.preventDefault();
  event.stopPropagation();
}, true);

render();
</script>
</body>
</html>
