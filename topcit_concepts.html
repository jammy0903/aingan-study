<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TOPCIT 개념집</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif;background:#f5f6fa;color:#1f2937;line-height:1.55}
header{position:sticky;top:0;background:#fff;border-bottom:1px solid #e5e7eb;z-index:50;padding:10px 16px 0}
h1{margin:0 0 8px;font-size:17px;display:flex;align-items:center;gap:8px}
.sub-tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:8px;border-bottom:1px solid #e5e7eb}
.sub-tab{flex-shrink:0;padding:7px 12px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#374151}
.sub-tab:hover{background:#f9fafb}
.sub-tab.active{background:#1f2937;color:#fff;border-color:#1f2937}
.sub-tab .cnt{font-size:11px;opacity:.75;margin-left:4px}
.ctrls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;padding:10px 0 12px;font-size:13px}
.mode-tog{display:inline-flex;border:1px solid #d1d5db;border-radius:8px;overflow:hidden;background:#fff}
.mode-tog button{border:none;background:transparent;padding:6px 12px;font-size:13px;cursor:pointer;color:#6b7280;font-weight:500}
.mode-tog button.on{background:#111827;color:#fff}
.filt{display:flex;gap:6px;flex-wrap:wrap}
.filt label{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border:1px solid #e5e7eb;border-radius:999px;background:#fff;cursor:pointer;font-size:12px;user-select:none}
.filt label.on-1{background:#fef2f2;border-color:#fecaca}
.filt label.on-2{background:#fffbeb;border-color:#fde68a}
.filt label.on-3{background:#f0fdf4;border-color:#bbf7d0}
.filt label.on-4{background:#f3f4f6;border-color:#d1d5db}
.filt input{margin:0}
.srch{flex:1;min-width:180px}
.srch input{width:100%;padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px}
.stat{font-size:12px;color:#6b7280;white-space:nowrap}
main{max-width:900px;margin:0 auto;padding:16px}
/* priority group (mode B) */
.p-grp{margin-bottom:16px;border-radius:10px;overflow:hidden;border:1px solid #e5e7eb;background:#fff}
.p-grp.p1{border-color:#fecaca}
.p-grp.p2{border-color:#fde68a}
.p-grp.p3{border-color:#bbf7d0}
.p-grp.p4{border-color:#d1d5db}
.p-hd{padding:10px 14px;background:#fafafa;border-bottom:1px solid #e5e7eb;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:14px}
.p-hd.p1{background:#fef2f2;border-bottom-color:#fecaca}
.p-hd.p2{background:#fffbeb;border-bottom-color:#fde68a}
.p-hd.p3{background:#f0fdf4;border-bottom-color:#bbf7d0}
.p-hd.p4{background:#f3f4f6;border-bottom-color:#d1d5db}
.p-hd .arrow{transition:transform .2s;color:#6b7280;font-size:12px}
.p-grp.collapsed .arrow{transform:rotate(-90deg)}
.p-grp.collapsed .p-bd{display:none}
.p-bd{padding:10px 12px;display:flex;flex-direction:column;gap:8px}
/* curriculum mode */
.ch{margin-bottom:18px}
.ch-hd{font-size:15px;font-weight:700;margin:0 0 8px;color:#111827;padding-bottom:4px;border-bottom:2px solid #e5e7eb}
.sec{margin:0 0 14px 0}
.sec-hd{font-size:13px;font-weight:600;color:#4b5563;margin:10px 0 6px}
.sec-bd{display:flex;flex-direction:column;gap:8px}
/* concept card */
.c{border:1px solid #e5e7eb;border-radius:8px;background:#fff;padding:10px 12px;transition:background .15s}
.c.done{background:#f9fafb;opacity:.7}
.c .top{display:flex;align-items:flex-start;gap:8px}
.c .ttl{flex:1;display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:600;font-size:14px;color:#111827}
.c.done .ttl{text-decoration:line-through;color:#6b7280}
.badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;font-size:11px;font-weight:700;flex-shrink:0}
.b1{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.b2{background:#fffbeb;color:#d97706;border:1px solid #fde68a}
.b3{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.b4{background:#f3f4f6;color:#6b7280;border:1px solid #d1d5db}
.c .chk{width:18px;height:18px;cursor:pointer;margin-top:2px}
.c .expand{color:#9ca3af;font-size:10px;margin-left:auto;user-select:none}
.meta{font-size:11px;color:#6b7280;margin-top:4px;display:flex;flex-wrap:wrap;gap:6px;padding-left:30px}
.meta .crumb{background:#f3f4f6;padding:1px 6px;border-radius:4px}
.meta .ev{font-style:italic;color:#9ca3af}
.body{margin-top:10px;padding:10px;border-top:1px dashed #e5e7eb;display:none;font-size:13px;color:#374151}
.c.open .body{display:block}
.body .sect{margin-bottom:8px}
.body .sect:last-child{margin-bottom:0}
.body .lbl{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:3px;letter-spacing:.03em}
.body .kw{display:inline-block;background:#eef2ff;color:#4338ca;padding:1px 7px;border-radius:4px;margin:2px 4px 2px 0;font-size:11px}
.empty{text-align:center;color:#9ca3af;padding:40px;font-size:14px}
</style>
</head>
<body>
<header>
  <h1>📚 TOPCIT 개념집 <span style="font-weight:400;color:#6b7280;font-size:13px">기출 기반 우선순위 학습</span></h1>
  <div class="sub-tabs" id="subTabs"></div>
  <div class="ctrls">
    <div class="mode-tog" id="modeTog">
      <button data-m="priority" class="on">🎯 우선순위</button>
      <button data-m="curriculum">📖 커리큘럼</button>
    </div>
    <div class="filt" id="filt">
      <label class="on-1"><input type="checkbox" data-p="1" checked>🔴 1</label>
      <label class="on-2"><input type="checkbox" data-p="2" checked>🟡 2</label>
      <label class="on-3"><input type="checkbox" data-p="3" checked>🟢 3</label>
      <label><input type="checkbox" data-p="4">⚪ 4</label>
    </div>
    <div class="srch"><input id="srch" placeholder="🔎 제목/내용 검색..."></div>
    <div class="stat" id="stat">—</div>
  </div>
</header>
<main id="view"></main>

<script>
const SUBJECTS = [
  {id:1, file:'topcit_01.json', short:'01 SW'},
  {id:2, file:'topcit_02.json', short:'02 DB'},
  {id:3, file:'topcit_03.json', short:'03 시스템'},
  {id:4, file:'topcit_04.json', short:'04 보안'},
  {id:5, file:'topcit_05.json', short:'05 IT비즈'},
  {id:6, file:'topcit_06.json', short:'06 PM'},
];
const PRIO = {
  1:{label:'반드시', emoji:'🔴', cls:'b1'},
  2:{label:'중요',   emoji:'🟡', cls:'b2'},
  3:{label:'보조',   emoji:'🟢', cls:'b3'},
  4:{label:'지엽',   emoji:'⚪', cls:'b4'},
};
const ST = { subject:2, mode:'priority', filter:{1:true,2:true,3:true,4:false}, search:'', concepts:{} };
const DATA = {};  // subject.id → parsed JSON
let saveTimer = null;

function esc(s){return (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

function cid(sid, flatIdx){ return `s${sid}_${String(flatIdx).padStart(3,'0')}` }

function flatten(sid){
  const d = DATA[sid];
  if(!d) return [];
  const out = [];
  let fi = 0;
  d.chapters.forEach((ch, chi) => {
    ch.sections.forEach((sec, si) => {
      (sec.concepts || []).forEach(c => {
        out.push({
          id: cid(sid, fi),
          flatIdx: fi,
          chIdx: chi, secIdx: si,
          chTitle: ch.title, secTitle: sec.title,
          title: c.title || c.name || '',
          background: c.background || '',
          explanation: c.explanation || '',
          mnemonic: c.mnemonic || '',
          keywords: c.keywords || [],
          priority: c.priority || 4,
          evidence: c.priority_evidence || '',
        });
        fi++;
      });
    });
  });
  return out;
}

function isDone(id){ return !!(ST.concepts[id]?.done) }
function setDone(id, v){
  if(!ST.concepts[id]) ST.concepts[id] = {};
  ST.concepts[id].done = v;
  if(!v) delete ST.concepts[id].done;
  save();
}

function passFilter(c){
  if(!ST.filter[c.priority]) return false;
  const q = ST.search.trim().toLowerCase();
  if(!q) return true;
  return (c.title+c.explanation+c.background+c.mnemonic+c.evidence).toLowerCase().includes(q);
}

function cardHTML(c){
  const p = PRIO[c.priority];
  const done = isDone(c.id);
  const hasBody = c.background || c.explanation || c.mnemonic || (c.keywords && c.keywords.length);
  return `<article class="c ${done?'done':''}" data-id="${c.id}">
    <div class="top">
      <span class="badge ${p.cls}" title="${p.label}">${c.priority}</span>
      <span class="ttl" data-act="toggle">${esc(c.title)||'(제목없음)'}</span>
      <span class="expand">${hasBody?'▼':''}</span>
      <input class="chk" type="checkbox" data-act="done" ${done?'checked':''} title="완료 체크">
    </div>
    <div class="meta">
      <span class="crumb">${esc(c.chTitle)} · ${esc(c.secTitle)}</span>
      ${c.evidence?`<span class="ev">💬 ${esc(c.evidence)}</span>`:''}
    </div>
    ${hasBody ? `<div class="body">
      ${c.keywords.length?`<div class="sect">${c.keywords.map(k=>`<span class="kw">${esc(k)}</span>`).join('')}</div>`:''}
      ${c.background?`<div class="sect"><div class="lbl">📖 배경</div>${esc(c.background)}</div>`:''}
      ${c.explanation?`<div class="sect"><div class="lbl">💡 설명</div>${esc(c.explanation)}</div>`:''}
      ${c.mnemonic?`<div class="sect"><div class="lbl">🎯 암기</div>${esc(c.mnemonic)}</div>`:''}
    </div>` : ''}
  </article>`;
}

function renderPriority(list){
  const buckets = {1:[],2:[],3:[],4:[]};
  list.forEach(c => buckets[c.priority].push(c));
  const view = document.getElementById('view');
  const parts = [];
  for(const lvl of [1,2,3,4]){
    if(!ST.filter[lvl]) continue;
    const items = buckets[lvl];
    if(!items.length) continue;
    const done = items.filter(c => isDone(c.id)).length;
    const collapsed = (lvl >= 3) ? 'collapsed' : '';
    parts.push(`<section class="p-grp p${lvl} ${collapsed}" data-lvl="${lvl}">
      <div class="p-hd p${lvl}" data-act="grp">
        <span>${PRIO[lvl].emoji} ${lvl}순위 · ${PRIO[lvl].label} <span style="font-weight:400;color:#6b7280">(${done}/${items.length})</span></span>
        <span class="arrow">▼</span>
      </div>
      <div class="p-bd">
        ${items.map(cardHTML).join('')}
      </div>
    </section>`);
  }
  view.innerHTML = parts.join('') || '<div class="empty">필터 조건에 맞는 개념이 없습니다.</div>';
}

function renderCurriculum(list){
  // group by chapter → section, preserving order from list
  const chMap = new Map();
  list.forEach(c => {
    const chKey = c.chIdx;
    if(!chMap.has(chKey)) chMap.set(chKey, { title:c.chTitle, secs:new Map() });
    const ch = chMap.get(chKey);
    if(!ch.secs.has(c.secIdx)) ch.secs.set(c.secIdx, { title:c.secTitle, items:[] });
    ch.secs.get(c.secIdx).items.push(c);
  });
  const view = document.getElementById('view');
  const parts = [];
  for(const [, ch] of chMap){
    const secParts = [];
    for(const [, sec] of ch.secs){
      if(!sec.items.length) continue;
      secParts.push(`<div class="sec">
        <div class="sec-hd">§ ${esc(sec.title)} <span style="font-weight:400;color:#9ca3af;font-size:11px">(${sec.items.length})</span></div>
        <div class="sec-bd">${sec.items.map(cardHTML).join('')}</div>
      </div>`);
    }
    if(secParts.length) parts.push(`<section class="ch">
      <div class="ch-hd">${esc(ch.title)}</div>
      ${secParts.join('')}
    </section>`);
  }
  view.innerHTML = parts.join('') || '<div class="empty">필터 조건에 맞는 개념이 없습니다.</div>';
}

function render(){
  const all = flatten(ST.subject);
  const list = all.filter(passFilter);
  // update stat
  const totalDone = all.filter(c => isDone(c.id)).length;
  const filtDone = list.filter(c => isDone(c.id)).length;
  document.getElementById('stat').textContent = `${filtDone}/${list.length} 표시 · 전체 ${totalDone}/${all.length} 완료`;
  // update tabs
  document.querySelectorAll('.sub-tab').forEach(el => {
    el.classList.toggle('active', Number(el.dataset.s) === ST.subject);
  });
  // render by mode
  if(ST.mode === 'priority') renderPriority(list);
  else renderCurriculum(list);
}

function renderTabs(){
  const tabs = document.getElementById('subTabs');
  tabs.innerHTML = SUBJECTS.map(s => {
    const all = flatten(s.id);
    const done = all.filter(c => isDone(c.id)).length;
    return `<button class="sub-tab" data-s="${s.id}">${s.short}<span class="cnt">${done}/${all.length}</span></button>`;
  }).join('');
}

function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    // read current progress, merge concepts, write back
    fetch('/api/progress').then(r=>r.json()).then(cur => {
      cur.concepts = ST.concepts;
      fetch('/api/progress', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(cur)
      });
    }).catch(() => {
      // fallback: write just concepts
      fetch('/api/progress', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({concepts: ST.concepts})
      });
    });
  }, 500);
}

// events
document.addEventListener('click', e => {
  const t = e.target;
  // subject tab
  const tab = t.closest('.sub-tab');
  if(tab){ ST.subject = Number(tab.dataset.s); render(); return; }
  // mode toggle
  const modeBtn = t.closest('.mode-tog button');
  if(modeBtn){
    ST.mode = modeBtn.dataset.m;
    document.querySelectorAll('.mode-tog button').forEach(b => b.classList.toggle('on', b.dataset.m === ST.mode));
    render();
    return;
  }
  // priority group header
  const grpHd = t.closest('[data-act="grp"]');
  if(grpHd){
    grpHd.parentElement.classList.toggle('collapsed');
    return;
  }
  // concept title → expand
  if(t.dataset.act === 'toggle'){
    t.closest('.c').classList.toggle('open');
    return;
  }
});
document.addEventListener('change', e => {
  const t = e.target;
  // filter checkbox
  if(t.matches('.filt input')){
    ST.filter[t.dataset.p] = t.checked;
    const lbl = t.closest('label');
    lbl.classList.toggle(`on-${t.dataset.p}`, t.checked);
    render();
    return;
  }
  // done checkbox
  if(t.dataset.act === 'done'){
    const card = t.closest('.c');
    setDone(card.dataset.id, t.checked);
    card.classList.toggle('done', t.checked);
    renderTabs();
    const stat = document.getElementById('stat');
    const all = flatten(ST.subject);
    const list = all.filter(passFilter);
    const totalDone = all.filter(c => isDone(c.id)).length;
    const filtDone = list.filter(c => isDone(c.id)).length;
    stat.textContent = `${filtDone}/${list.length} 표시 · 전체 ${totalDone}/${all.length} 완료`;
    // update group counter if in priority mode
    if(ST.mode === 'priority'){
      const grp = card.closest('.p-grp');
      if(grp){
        const lvl = grp.dataset.lvl;
        const items = list.filter(c => c.priority === Number(lvl));
        const done = items.filter(c => isDone(c.id)).length;
        grp.querySelector('.p-hd span span').textContent = `(${done}/${items.length})`;
      }
    }
  }
});
let searchTimer = null;
document.getElementById('srch').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { ST.search = e.target.value; render(); }, 200);
});

// boot
async function boot(){
  try{
    const progress = await fetch('/api/progress').then(r=>r.json()).catch(()=>({}));
    ST.concepts = progress.concepts || {};
    const results = await Promise.all(SUBJECTS.map(s =>
      fetch(`/topcit_json_v2/${s.file}`).then(r=>r.json())
    ));
    SUBJECTS.forEach((s, i) => DATA[s.id] = results[i]);
    renderTabs();
    render();
  }catch(err){
    document.getElementById('view').innerHTML = `<div class="empty">로드 실패: ${esc(err.message)}</div>`;
    console.error(err);
  }
}
boot();
</script>
</body>
</html>
