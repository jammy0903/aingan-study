<!DOCTYPE html>
<html lang="ko">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>TOPCIT 04-07 개인정보 보호</title>
<style>
:root{--g-blue:#1558d6;--g-url:#0d652d;--g-text:#4d5156;--g-border:#dfe1e5}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#fff;color:#202124;font-family:Roboto,'Noto Sans KR',arial,sans-serif;font-size:14px}

/* ── 기존 헤더 완전 숨김 ── */
.header{display:none!important}
.search-wrap{display:none!important}
.tabs{display:none!important}
.prio-bar{display:none!important}

/* ── 결과 래퍼: 실제 구글처럼 좌측 여백 ── */
.g-body{
  display:flex;
  padding:0 0 0 148px;
  max-width:1200px;
}
@media(max-width:900px){.g-body{padding:0 24px}}

.g-results{
  flex:1;
  max-width:660px;
  padding-top:4px;
}

/* ── 결과 수 텍스트 ── */
.g-result-info{
  font-size:13px;
  color:#70757a;
  padding:5px 0 16px;
  border-bottom:1px solid var(--g-border);
  margin-bottom:4px;
}

/* ── 섹션 그룹 ── */
.section-group{padding:0!important}
.section-group.hidden{display:none!important}
.section-label{
  display:none;
}

/* ── 카드 그리드 → 구글 리스트 ── */
.card-grid{
  display:flex!important;
  flex-direction:column!important;
  gap:0!important;
}

/* ── 검색 결과 한 건 ── */
.card{
  background:transparent!important;
  border:none!important;
  border-radius:0!important;
  box-shadow:none!important;
  padding:16px 0 4px!important;
  min-height:0!important;
  cursor:pointer;
  position:relative;
  display:block!important;
  gap:0!important;
  transition:none!important;
  border-bottom:none!important;
  margin-bottom:12px!important;
}
.card:hover{transform:none!important;box-shadow:none!important}
.card.hidden-card{display:none!important}
.card-badges{display:none!important}
.card-cta{display:none!important}

/* 파비콘 + URL 라인 */
.card::before{
  content:attr(data-url);
  display:flex;
  align-items:center;
  font-size:12px;
  color:var(--g-url);
  margin-bottom:3px;
  line-height:1.5;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* 제목 */
.card-title{
  font-size:20px!important;
  font-weight:400!important;
  color:var(--g-blue)!important;
  line-height:1.3!important;
  padding:0!important;
  font-family:inherit!important;
  margin-bottom:3px!important;
}
.card:hover .card-title{
  text-decoration:underline;
  color:#1a0dab!important;
}

/* 스니펫 */
.card-preview{
  font-size:13.5px!important;
  color:var(--g-text)!important;
  line-height:1.58!important;
  display:-webkit-box!important;
  -webkit-line-clamp:2!important;
  -webkit-box-orient:vertical!important;
  overflow:hidden!important;
  flex:none!important;
  word-break:keep-all;
}

/* 날짜 흉내 (스니펫 앞 회색) */
.card::after{
  content:'';
  display:block;
  height:1px;
  background:var(--g-border);
  margin-top:16px;
}

/* ── 레슨 뷰어 ── */
.lesson{display:none;position:fixed;inset:0;background:#fff;z-index:100000;flex-direction:column;overflow:hidden}
.lesson.show{display:flex}

/* 레슨 헤더: 구글 스타일 흰색 */
.l-head{
  background:#fff;
  color:#202124;
  padding:.6rem 1.5rem;
  display:flex;align-items:center;gap:.8rem;flex-shrink:0;
  border-bottom:1px solid var(--g-border);
  box-shadow:0 1px 6px rgba(32,33,36,.12);
}
.l-back{
  background:none;border:none;color:#5f6368;
  font-size:1.4rem;cursor:pointer;padding:0;line-height:1;
  transition:color .15s;
}
.l-back:hover{color:#202124}
.l-title{
  flex:1;font-size:.95rem;font-weight:500;
  font-family:inherit;line-height:1.3;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  color:#202124;
}
.l-page-ind{
  font-size:.78rem;font-weight:500;
  background:#f1f3f4;color:#5f6368;
  padding:.22rem .65rem;border-radius:1rem;flex-shrink:0;
}

/* 진행 바 */
.l-progress{height:3px;background:#f1f3f4;flex-shrink:0}
.l-progress-bar{height:100%;background:#1a73e8;width:0%;transition:width .3s ease}

/* 레슨 본문: 양옆 마진 확보 */
.l-body{
  flex:1;overflow-y:auto;
  display:flex;flex-direction:column;align-items:center;
  padding:2rem 24px 6rem;
  background:#fff;
}
.l-page{
  width:100%;
  max-width:680px;
  animation:slideIn .2s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* 레슨 제목 */
.l-page-title{
  font-size:1.6rem;font-weight:400;
  color:#202124;
  margin-bottom:.5rem;
  line-height:1.25;
  border-bottom:2px solid var(--g-border);
  padding-bottom:.6rem;
  margin-bottom:.8rem;
}
.l-page-meta{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.85rem}
.l-page-meta .chip{padding:.2rem .6rem;border-radius:1rem;font-size:.72rem;font-weight:600}
.chip-prio-1{background:#fee2e2;color:#991b1b}
.chip-prio-2{background:#fef3c7;color:#92400e}
.chip-prio-3{background:#dcfce7;color:#166534}
.chip-prio-4{background:#f1f5f9;color:#475569}
.l-page-kw{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:1.2rem}
.l-page-kw span{
  background:#e8f0fe;color:#1557b0;
  border:none;border-radius:4px;
  padding:.2rem .6rem;font-size:.72rem;font-weight:500;
}

/* 섹션 블록: 구글 스니펫 스타일 */
.sec{border-radius:8px;padding:.9rem 1.1rem;line-height:1.7;margin-bottom:.75rem;font-size:.9rem}
.sec-summary{background:#f8f9fa;border-left:4px solid #1a73e8;color:#202124;font-weight:500}
.sec-bg{background:#fef7ec;border-left:4px solid #f9ab00}
.sec-expl{background:#f8f9fe;border-left:4px solid #4285f4}
.sec-why{background:#f1faf5;border-left:4px solid #34a853}
.sec-term{background:#faf5ff;border-left:4px solid #9334ea}
.sec-link{background:#fff7ed;border-left:4px solid #e8710a}
.sec-mn{background:#fef9e7;border-left:4px solid #fbbc05;font-weight:500}
.sec-trap{background:#fce8e6;border-left:4px solid #ea4335;color:#7b1d1d}
.sec-src{background:#f8f9fa;border-left:4px solid #80868b}
.sec-types{background:#f0f9ff;border-left:4px solid #0284c7}
.sec-types .sec-label{color:#075985}
.sec-label{
  font-size:.68rem;font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;
  margin-bottom:.45rem;opacity:.75;
}
.sec-bg .sec-label{color:#92400e}.sec-expl .sec-label{color:#1557b0}
.sec-why .sec-label{color:#0d652d}.sec-term .sec-label{color:#6b21d8}
.sec-link .sec-label{color:#9a3412}.sec-mn .sec-label{color:#f9ab00}
.sec-trap .sec-label{color:#ea4335}.sec-summary .sec-label{color:#1a73e8}
.sec-src .sec-label{color:#5f6368}
.sec p{font-size:.9rem;line-height:1.72}

/* 타입 목록 */
.types-caption{font-size:.85rem;color:#3c4043;margin-bottom:.6rem;line-height:1.6}
.types-list{display:flex;flex-direction:column;gap:.5rem;counter-reset:tc}
.type-item{display:grid;grid-template-columns:2rem 1fr;gap:.5rem;align-items:start;background:#fff;border:1px solid #dadce0;border-radius:8px;padding:.7rem .8rem;counter-increment:tc;position:relative}
.type-item::before{content:counter(tc);display:inline-flex;align-items:center;justify-content:center;width:1.6rem;height:1.6rem;border-radius:4px;background:#e8f0fe;color:#1557b0;font-size:.8rem;font-weight:700;line-height:1}
.type-body{min-width:0}
.type-head{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center;margin-bottom:.2rem}
.type-name{font-size:.9rem;font-weight:600;color:#202124}
.type-en{font-size:.72rem;color:#5f6368;font-weight:500}
.type-tier{display:inline-flex;align-items:center;padding:.06rem .4rem;border-radius:999px;font-size:.62rem;font-weight:700}
.tier-strong{background:#fce8e6;color:#c5221f}.tier-mid{background:#fef0cd;color:#b06000}.tier-weak{background:#e6f4ea;color:#137333}
.type-note{font-size:.85rem;line-height:1.65;color:#3c4043;word-break:keep-all}
.types-scale{display:flex;align-items:center;gap:.4rem;margin-top:.6rem;padding:.45rem .65rem;background:#f8f9fa;border:1px dashed #dadce0;border-radius:6px;font-size:.72rem;color:#5f6368;font-weight:600}
.types-scale .scale-arrow{flex:1;height:5px;border-radius:999px;background:linear-gradient(90deg,#34a853,#fbbc05,#ea4335)}
.types-scale.reverse .scale-arrow{background:linear-gradient(90deg,#ea4335,#fbbc05,#34a853)}

/* 암기 섹션 */
.mn-list{display:flex;flex-direction:column;gap:.5rem}
.mn-line{display:flex;align-items:flex-start;gap:.65rem;background:#fff;border:1px solid #dadce0;border-radius:8px;padding:.65rem .75rem}
.mn-picto{flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:1.5rem;height:1.5rem;border-radius:4px;background:#e8f0fe;font-size:.75rem;font-weight:700;line-height:1;color:#1557b0}
.mn-main{display:flex;flex-direction:column;gap:.25rem;min-width:0}
.mn-tag{display:inline-flex;align-items:center;width:fit-content;padding:.1rem .42rem;border-radius:999px;background:#fef0cd;color:#b06000;font-size:.63rem;font-weight:700;letter-spacing:.04em}
.mn-text{font-size:.92rem;line-height:1.72;color:#202124;word-break:keep-all}
.mn-text strong{color:#1a73e8;font-weight:600}

/* 팩트/출처 */
.fact-list{display:flex;flex-direction:column;gap:.55rem}
.fact-item{background:#fff;border:1px solid #dadce0;border-radius:8px;padding:.72rem .82rem}
.fact-term{font-size:.87rem;font-weight:600;color:#202124;margin-bottom:.2rem}
.fact-note{font-size:.88rem;line-height:1.68;color:#3c4043;word-break:keep-all}
.fact-link-label{display:inline-flex;align-items:center;padding:.1rem .42rem;border-radius:999px;background:#e8f0fe;color:#1557b0;font-size:.63rem;font-weight:700;margin-bottom:.35rem}
.src-list{display:flex;flex-direction:column;gap:.4rem}
.src-link{display:flex;align-items:flex-start;gap:.4rem;text-decoration:none;color:#202124;background:#f8f9fa;border:1px solid #dadce0;border-radius:8px;padding:.65rem .75rem;transition:border-color .15s}
.src-link:hover{border-color:#1a73e8}
.src-bullet{flex-shrink:0;color:#1a73e8;font-weight:600}
.src-text{font-size:.84rem;line-height:1.5}
.src-host{display:block;font-size:.71rem;color:#5f6368;margin-top:.1rem}

/* 표 */
.ctable{width:100%;border-collapse:collapse;font-size:.83rem;background:#fff;border-radius:8px;overflow:hidden;margin-top:.4rem;border:1px solid #dadce0}
.ctable th{background:#4285f4;color:#fff;padding:.5rem .65rem;text-align:left;font-weight:600;font-size:.78rem}
.ctable td{padding:.5rem .65rem;border-top:1px solid #dadce0;vertical-align:top;line-height:1.55}
.ctable tr:nth-child(even) td{background:#f8f9fa}

/* 완료 화면 */
.done-page{text-align:center;padding:3rem 1rem}
.done-emoji{font-size:4rem;margin-bottom:1rem;animation:pop .4s ease}
@keyframes pop{from{transform:scale(0)}80%{transform:scale(1.15)}to{transform:scale(1)}}
.done-title{font-size:1.4rem;font-weight:400;color:#202124;margin-bottom:.4rem}
.done-sub{font-size:.9rem;color:#5f6368;margin-bottom:2rem}
.done-actions{display:flex;flex-direction:column;gap:.55rem;max-width:280px;margin:0 auto}
.done-btn{padding:.78rem 1.2rem;border-radius:8px;font-size:.92rem;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.done-btn-primary{background:#1a73e8;color:#fff}
.done-btn-primary:hover{background:#1557b0}
.done-btn-sub{background:#fff;color:#1a73e8;border:1px solid #dadce0}
.done-btn-sub:hover{background:#f8f9fa}

/* 하단 네비게이션 */
.l-foot{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;padding:.65rem 24px;
  display:flex;gap:.5rem;
  border-top:1px solid var(--g-border);
  z-index:1010;
  justify-content:center;
}
.l-foot > * { max-width:320px; flex:1; }
.l-nav-btn{
  padding:.68rem;border-radius:24px;
  border:1px solid #dadce0;background:#fff;color:#1a73e8;
  font-size:.88rem;font-weight:500;cursor:pointer;
  font-family:inherit;transition:all .15s;
}
.l-nav-btn:hover:not(:disabled){background:#f8f9fa}
.l-nav-btn:disabled{opacity:.35;cursor:not-allowed}
.l-nav-btn.primary{background:#1a73e8;color:#fff;border-color:#1a73e8}
.l-nav-btn.primary:hover:not(:disabled){background:#1557b0;border-color:#1557b0}

.g-top-bar{padding:6px 0 4px;font-size:13px}
.g-site-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.g-favicon{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.g-site-meta{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0}
.g-site-name{font-size:13px;color:#202124;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.g-site-url{font-size:12px;color:#4d5156;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.g-dots{background:none;border:none;cursor:pointer;color:#5f6368;font-size:16px;padding:4px 6px;border-radius:50%;flex-shrink:0;line-height:1;transition:background .1s}
.g-dots:hover{background:#f1f3f4}
.g-date{color:#70757a}
.card::before{display:none!important}

</style>
</head>
<body>

<div class="header">
  <a href="../" class="header-back">←</a>
  <span style="font-size:1.2rem">🔒</span>
  <h1><span style="opacity:.7;font-size:.85em">04</span> &nbsp;개인정보 보호</h1>
  <span class="header-cnt">2개</span>
</div>

<div class="search-wrap">
  <input class="search" type="text" placeholder="🔍  개념 검색..." oninput="applyFilters()">
</div>

<div class="tabs" id="tab-bar"><button class="tab active" onclick="filterTab(this,'all')">전체</button><button class="tab" onclick="filterTab(this,'0')">개인정보보호</button></div>
<div class="prio-bar"><button class="pchip active" data-prio="all" onclick="filterPrio(this)">전체</button><button class="pchip" data-prio="1" onclick="filterPrio(this)" style="--pc:#dc2626">🔴 P1 최우선</button><button class="pchip" data-prio="2" onclick="filterPrio(this)" style="--pc:#d97706">🟡 P2 중요</button><button class="pchip" data-prio="3" onclick="filterPrio(this)" style="--pc:#16a34a">🟢 P3 보통</button><button class="pchip" data-prio="4" onclick="filterPrio(this)" style="--pc:#80868b">⚪ P4 보조</button></div>

<div id="card-content"><div class="section-group" data-chapter="0"><div class="section-label">개인정보보호</div><div class="card-grid"><div class="card" data-prio="2" onclick="startLesson(0)"><div class="card-badges"><span class="b-prio b-prio-2" title="중요">🟡 P2</span><span class="b-mn" title="암기 포인트">🧠</span></div><div class="card-title">개인정보보호 수칙</div><div class="card-preview">인터넷이 발달하면서 기업들이 사용자 정보를 마구잡이로 수집하고 팔아넘기는 문제가 생겼어. …</div><div class="card-cta">레슨 시작 →</div></div><div class="card" data-prio="3" onclick="startLesson(1)"><div class="card-badges"><span class="b-prio b-prio-3" title="보통">🟢 P3</span><span class="b-mn" title="암기 포인트">🧠</span></div><div class="card-title">정보보호 및 개인정보보호 관리체계(ISMS-P)</div><div class="card-preview">옛날에는 &#x27;정보보안&#x27;을 관리하는 인증이랑 &#x27;개인정보 보호&#x27;를 관리하는 인증이 따로따로 있어…</div><div class="card-cta">레슨 시작 →</div></div></div></div></div>

<!-- ── 레슨 모드 ── -->
<div class="lesson" id="lesson">
  <div class="l-head">
    <button class="l-back" onclick="exitLesson()">←</button>
    <div class="l-title" id="l-title"></div>
    <div class="l-page-ind" id="l-page-ind">1 / 1</div>
  </div>
  <div class="l-progress"><div class="l-progress-bar" id="l-progress-bar"></div></div>
  <div class="l-body" id="l-body"></div>
  <div class="l-foot">
    <button class="l-nav-btn" id="l-prev" onclick="prevPage()">← 이전</button>
    <button class="l-nav-btn primary" id="l-next" onclick="nextPage()">다음 →</button>
  </div>
</div>

<script>
const LESSONS = [{"title": "개인정보보호 수칙", "keywords": [], "summary": "", "background": "인터넷이 발달하면서 기업들이 사용자 정보를 마구잡이로 수집하고 팔아넘기는 문제가 생겼어. 그래서 나라에서 '개인정보는 이렇게 다뤄야 해!'라는 규칙을 법으로 만들게 됐지.", "explanation": "네가 앱에 가입할 때 '개인정보 수집에 동의합니다' 체크하는 거 본 적 있지? 그게 바로 이 수칙 때문이야. 앱은 왜 정보를 모으는지, 얼마나 보관할 건지, 거부하면 어떤 불이익이 있는지를 미리 알려줘야 하고, 나중에 필요 없어지면 절대 복구 못 하게 완전히 지워야 해.", "why": "", "term_focus": [], "connections": [], "types": null, "mnemonic": "개인정보 수칙 = '목·항·기·불 → 동의, 끝나면 파기!' 👉 목(수집 목적), 항(수집 항목), 기(보유 기간), 불(거부 시 불이익) — 이 4가지 알리고 동의받고, 끝나면 무조건 파기!", "trap": "", "table": [], "sources": [], "priority": 2}, {"title": "정보보호 및 개인정보보호 관리체계(ISMS-P)", "keywords": [], "summary": "", "background": "옛날에는 '정보보안'을 관리하는 인증이랑 '개인정보 보호'를 관리하는 인증이 따로따로 있어서, 기업들이 두 개를 따로따로 받아야 해서 너무 번거롭고 비용도 두 배로 들었어. 그래서 이 두 개를 하나로 합쳐버린 통합 인증 제도가 바로 ISMS-P야!", "explanation": "학교에서 '출석부'랑 '생활기록부'를 따로 관리하다가 '학생종합관리부' 하나로 합친 것처럼, 정보보안 관리(ISMS)랑 개인정보 보호 관리(PIMS)를 하나의 통합 관리 시스템으로 묶은 거야. 쉽게 말하면 '우리 회사는 해킹도 잘 막고, 개인정보도 잘 지킵니다!'를 한 번에 인증받는 제도라고 생각하면 돼. 네이버나 카카오 같은 대형 서비스 기업들이 이 인증을 받아야 해!", "why": "", "term_focus": [], "connections": [], "types": null, "mnemonic": "ISMS-P = '아이 씀씀이 P(플러스)' → 정보보안(ISMS)에 개인정보보호(P)를 플러스(+)해서 하나로 합쳤다!", "trap": "", "table": [], "sources": [], "priority": 3}];
const PRIO_LABEL = {1:'최우선', 2:'중요', 3:'보통', 4:'보조'};
let curTab = 'all';
let curPrio = 'all';
let curLessonIdx = -1;
let curPage = 0;
let pages = [];
const CHAPTER_MAP = {};
const CHAPTER_NAMES = {};
document.querySelectorAll('.section-group').forEach(grp => {
  const ch = parseInt(grp.dataset.chapter);
  const lbl = grp.querySelector('.section-label');
  if (lbl) CHAPTER_NAMES[ch] = lbl.textContent.trim();
  grp.querySelectorAll('.card').forEach(card => {
    const m = (card.getAttribute('onclick') || '').match(/startLesson\((\d+)\)/);
    if (m) CHAPTER_MAP[parseInt(m[1])] = ch;
  });
});
function isLastInChapter(idx) {
  const ch = CHAPTER_MAP[idx];
  return CHAPTER_MAP[idx + 1] !== ch || idx + 1 >= LESSONS.length;
}

function filterTab(btn, ch) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  curTab = ch;
  applyFilters();
}

function filterPrio(btn) {
  document.querySelectorAll('.pchip').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  curPrio = btn.dataset.prio;
  applyFilters();
}

function applyFilters() {
  const q = document.querySelector('.search').value.toLowerCase();
  document.querySelectorAll('.section-group').forEach(grp => {
    const chOk = curTab === 'all' || grp.dataset.chapter === curTab;
    grp.classList.toggle('hidden', !chOk);
    if (chOk) {
      let any = false;
      grp.querySelectorAll('.card').forEach(c => {
        const qOk = !q || c.textContent.toLowerCase().includes(q);
        const pOk = curPrio === 'all' || c.dataset.prio === curPrio;
        const show = qOk && pOk;
        c.classList.toggle('hidden-card', !show);
        if (show) any = true;
      });
      if (q || curPrio !== 'all') grp.classList.toggle('hidden', !any);
    }
  });
}

function escHtml(str) {
  return (str || '').replace(/[&<>"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[ch]);
}

function splitMnemonic(text) {
  return (text || '')
    .replace(/\r\n/g, '\n')
    .replace(/\s+\/\s+/g, '\n')
    .replace(/\s+vs\.\s+/gi, '\n')
    .replace(/\s+→\s+/g, ' → ')
    .replace(/\s+↔\s+/g, ' ↔ ')
    .replace(/\.\s+/g, '.\n')
    .replace(/다\.\s+/g, '다.\n')
    .replace(/됨\.\s+/g, '됨.\n')
    .split(/\n+/)
    .map(line => line.trim())
    .filter(Boolean);
}

function mnemonicIcon(tag, text) {
  if (tag) return '◈';
  if (text.includes('↔') || text.includes('=')) return '⇄';
  if (text.includes('→')) return '→';
  return '•';
}

function renderParagraph(text) {
  return escHtml(text || '').replace(/\n/g, '<br>');
}

function renderFactSection(label, secClass, items) {
  if (!items || !items.length) return '';
  const html = items.map(item => `
    <div class="fact-item">
      ${item.label ? `<div class="fact-link-label">${escHtml(item.label)}</div>` : ''}
      <div class="fact-term">${escHtml(item.term || '')}</div>
      <div class="fact-note">${renderParagraph(item.note || '')}</div>
    </div>`).join('');
  return `<div class="sec ${secClass}"><div class="sec-label">${label}</div><div class="fact-list">${html}</div></div>`;
}

function renderTypesSection(types) {
  if (!types) return '';
  const items = Array.isArray(types) ? types : (types.items || []);
  if (!items.length) return '';
  const caption = !Array.isArray(types) && types.caption ? types.caption : '';
  const scale = !Array.isArray(types) ? (types.scale || '') : '';
  const scaleLabels = {
    'strong-to-weak': ['강함','약함','reverse'],
    'weak-to-strong': ['약함','강함',''],
  };
  const tierClass = {
    'strong': 'tier-strong',
    'mid': 'tier-mid',
    'weak': 'tier-weak',
  };
  const tierLabel = {
    'strong': '강함',
    'mid': '중간',
    'weak': '약함',
  };
  const rows = items.map(it => {
    const tierCls = it.tier && tierClass[it.tier] ? tierClass[it.tier] : '';
    const tierLbl = it.tier && tierLabel[it.tier] ? tierLabel[it.tier] : (it.tier || '');
    return `
      <div class="type-item">
        <div class="type-body">
          <div class="type-head">
            <span class="type-name">${escHtml(it.name || '')}</span>
            ${it.en ? `<span class="type-en">${escHtml(it.en)}</span>` : ''}
            ${tierCls ? `<span class="type-tier ${tierCls}">${escHtml(tierLbl)}</span>` : ''}
          </div>
          <div class="type-note">${renderParagraph(it.note || '')}</div>
        </div>
      </div>`;
  }).join('');
  let scaleHtml = '';
  if (scale && scaleLabels[scale]) {
    const [L, R, rev] = scaleLabels[scale];
    scaleHtml = `<div class="types-scale ${rev}"><span>${L}</span><span class="scale-arrow"></span><span>${R}</span></div>`;
  }
  return `<div class="sec sec-types">
    <div class="sec-label">🗂️ 유형</div>
    ${caption ? `<div class="types-caption">${renderParagraph(caption)}</div>` : ''}
    <div class="types-list">${rows}</div>
    ${scaleHtml}
  </div>`;
}

function renderSourceSection(sources) {
  if (!sources || !sources.length) return '';
  const html = sources.map(src => {
    const hasUrl = !!src.url;
    let host = '';
    if (hasUrl) {
      try { host = new URL(src.url).hostname.replace(/^www\./, ''); } catch (_err) { host = ''; }
    }
    const inner = `
        <span class="src-bullet">↗</span>
        <span class="src-text">
          ${escHtml(src.title || src.url || '')}
          ${src.note ? `<span class="src-host">${escHtml(src.note)}</span>` : ''}
          ${!src.note && host ? `<span class="src-host">${escHtml(host)}</span>` : ''}
        </span>`;
    if (hasUrl) {
      return `<a class="src-link" href="${escHtml(src.url)}" target="_blank" rel="noreferrer">${inner}</a>`;
    }
    return `<div class="src-link">${inner}</div>`;
  }).join('');
  return `<div class="sec sec-src"><div class="sec-label">🔗 출처</div><div class="src-list">${html}</div></div>`;
}

function renderMnemonic(text) {
  const lines = splitMnemonic(text);
  if (!lines.length) return '';
  const html = lines.map(line => {
    const m = line.match(/^【([^】]+)】\s*(.*)$/);
    const tag = m ? m[1].trim() : '';
    const body = (m ? m[2] : line).trim();
    const safeBody = escHtml(body).replace(/'([^']+)'/g, '<strong>$1</strong>');
    return `
      <div class="mn-line">
        <span class="mn-picto">${mnemonicIcon(tag, body)}</span>
        <div class="mn-main">
          ${tag ? `<span class="mn-tag">${escHtml(tag)}</span>` : ''}
          <div class="mn-text">${safeBody}</div>
        </div>
      </div>`;
  }).join('');
  return `<div class="sec sec-mn"><div class="sec-label">🧠 5초 암기</div><div class="mn-list">${html}</div></div>`;
}

function buildPages(idx) {
  const lesson = LESSONS[idx];
  if (isLastInChapter(idx)) {
    return [
      { type: 'learn', data: lesson },
      { type: 'done',  data: lesson },
    ];
  }
  return [{ type: 'learn', data: lesson }];
}

function renderPage() {
  const body = document.getElementById('l-body');
  const page = pages[curPage];
  body.innerHTML = '';
  body.scrollTop = 0;

  const wrap = document.createElement('div');
  wrap.className = 'l-page';

  if (page.type === 'learn') {
    const d = page.data;
    let h = '';
    h += `<h1 class="l-page-title">${escHtml(d.title)}</h1>`;
    const metaBits = [];
    if (d.priority && PRIO_LABEL[d.priority]) {
      metaBits.push(`<span class="chip chip-prio-${d.priority}">P${d.priority} · ${PRIO_LABEL[d.priority]}</span>`);
    }
    if (metaBits.length) h += `<div class="l-page-meta">${metaBits.join('')}</div>`;
    if (d.keywords && d.keywords.length) {
      h += `<div class="l-page-kw">${d.keywords.map(k => `<span>★ ${escHtml(k)}</span>`).join('')}</div>`;
    }
    if (d.summary)     h += `<div class="sec sec-summary"><div class="sec-label">📌 한 줄 요약</div><p>${renderParagraph(d.summary)}</p></div>`;
    if (d.background)  h += `<div class="sec sec-bg"><div class="sec-label">📜 배경·맥락</div><p>${renderParagraph(d.background)}</p></div>`;
    if (d.explanation) h += `<div class="sec sec-expl"><div class="sec-label">📖 핵심 설명</div><p>${renderParagraph(d.explanation)}</p></div>`;
    if (d.types)       h += renderTypesSection(d.types);
    if (d.why)         h += `<div class="sec sec-why"><div class="sec-label">🔍 왜 이렇게 됐나</div><p>${renderParagraph(d.why)}</p></div>`;
    if (d.term_focus && d.term_focus.length)   h += renderFactSection('🈶 용어·한자 풀이', 'sec-term', d.term_focus);
    if (d.connections && d.connections.length) h += renderFactSection('🧭 앞뒤 흐름 연결', 'sec-link', d.connections);
    if (d.mnemonic)    h += renderMnemonic(d.mnemonic);
    if (d.trap)        h += `<div class="sec sec-trap"><div class="sec-label">⚠️ 시험 함정</div><p>${renderParagraph(d.trap)}</p></div>`;
    if (d.table && d.table.length) {
      const cols = Object.keys(d.table[0]);
      const head = cols.map(c => `<th>${escHtml(c)}</th>`).join('');
      const rows = d.table.map(r => '<tr>' + cols.map(c => `<td>${escHtml(r[c] || '')}</td>`).join('') + '</tr>').join('');
      h += `<div class="sec sec-summary" style="padding:0;background:transparent;border:none">
        <div class="sec-label" style="padding-left:.3rem;color:#5f6368;margin-bottom:.5rem">📊 정리표</div>
        <table class="ctable"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table>
      </div>`;
    }
    if (d.sources && d.sources.length) h += renderSourceSection(d.sources);
    wrap.innerHTML = h;
  }
  else if (page.type === 'done') {
    const d = page.data;
    const hasNext = curLessonIdx + 1 < LESSONS.length;
    wrap.innerHTML = `
      <div class="done-page">
        <div class="done-emoji">🎉</div>
        <div class="done-title">주제 완료!</div>
        <div class="done-sub">${escHtml(CHAPTER_NAMES[CHAPTER_MAP[curLessonIdx]] || d.title)}</div>
        <div class="done-actions">
          ${hasNext ? '<button class="done-btn done-btn-primary" onclick="startLesson(' + (curLessonIdx + 1) + ')">다음 개념 →</button>' : ''}
          <button class="done-btn done-btn-sub" onclick="exitLesson()">목록으로 돌아가기</button>
        </div>
      </div>`;
  }

  body.appendChild(wrap);

  document.getElementById('l-page-ind').textContent = `${curPage + 1} / ${pages.length}`;
  document.getElementById('l-progress-bar').style.width = `${((curPage + 1) / pages.length) * 100}%`;
  document.getElementById('l-prev').disabled = curPage === 0;
  const _nb = document.getElementById('l-next');
  if (pages[curPage].type === 'learn' && curPage === pages.length - 1 && !isLastInChapter(curLessonIdx)) {
    _nb.disabled = false;
    _nb.textContent = '다음 개념 →';
  } else {
    _nb.disabled = curPage === pages.length - 1;
    _nb.textContent = curPage === pages.length - 2 ? '완료 🎉' : '다음 →';
  }
}

function startLesson(idx) {
  if (idx < 0 || idx >= LESSONS.length) return;
  curLessonIdx = idx;
  curPage = 0;
  pages = buildPages(idx);
  document.getElementById('l-title').textContent = LESSONS[idx].title;
  document.getElementById('lesson').classList.add('show');
  document.body.style.overflow = 'hidden';
  renderPage();
}

function exitLesson() {
  document.getElementById('lesson').classList.remove('show');
  document.body.style.overflow = '';
  curLessonIdx = -1;
}

function nextPage() {
  if (curPage < pages.length - 1) { curPage++; renderPage(); return; }
  if (pages[curPage].type === 'learn' && !isLastInChapter(curLessonIdx) && curLessonIdx + 1 < LESSONS.length) {
    startLesson(curLessonIdx + 1);
  }
}
function prevPage() { if (curPage > 0) { curPage--; renderPage(); } }

document.addEventListener('keydown', e => {
  if (curLessonIdx < 0) return;
  if (e.key === 'ArrowLeft')  prevPage();
  if (e.key === 'ArrowRight') nextPage();
  if (e.key === 'Escape')     exitLesson();
});
</script>
</body>
</html>
