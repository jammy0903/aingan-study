<!DOCTYPE html>
<html lang="ko">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TOPCIT 05 IT 비즈니스와 윤리</title>
<style>
:root{--font-sans:Roboto,'Noto Sans KR','Malgun Gothic',sans-serif;--font-serif:"NanumMyeongjo","Nanum Myeongjo","Batang","Apple SD Gothic Neo",serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:#f1f3f4;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 0 3rem;color:#202124}
.s-header{background:#b45309;color:#fff;width:100%;padding:.9rem 1.25rem;display:flex;align-items:center;gap:.75rem;box-shadow:0 2px 10px rgba(0,0,0,.15);margin-bottom:2rem}
.s-back{color:#fff;text-decoration:none;font-size:1.2rem;opacity:.85}
.s-header h1{font-size:1.05rem;font-weight:800;flex:1;font-family:var(--font-serif)}
.s-header span.cnt{font-size:.78rem;opacity:.8;white-space:nowrap}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.85rem;width:100%;max-width:780px;padding:0 1.25rem}
@media(min-width:600px){.grid{grid-template-columns:repeat(3,1fr)}}
.chap-card{background:#fff;border-radius:.85rem;padding:1.3rem 1rem;text-decoration:none;border:2px solid var(--main);transition:all .18s;display:flex;flex-direction:column;gap:.2rem;position:relative;overflow:hidden;color:inherit}
.chap-card::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:var(--main)}
.chap-card:hover{transform:translateY(-3px);box-shadow:0 4px 8px rgba(60,64,67,.3),0 1px 3px rgba(60,64,67,.15)}
.chap-emoji{font-size:1.8rem;margin-bottom:.15rem}
.chap-num{font-size:.7rem;font-weight:800;color:var(--sub);letter-spacing:.07em}
.chap-title{font-size:.95rem;font-weight:800;line-height:1.35;font-family:var(--font-serif)}
.chap-status{font-size:.7rem;color:var(--main);font-weight:700;margin-top:.3rem}
.footer{margin-top:2rem;font-size:.75rem;color:#80868b;text-align:center}
</style>
</head>
<body>
<div class="s-header">
  <a href="../" class="s-back">←</a>
  <span style="font-size:1.2rem">💼</span>
  <h1>05 &nbsp;IT 비즈니스와 윤리</h1>
  <span class="cnt">87개 개념</span>
</div>
<div class="grid"><a href="./01/" class="chap-card" style="--main:#b45309;--sub:#78350f"><div class="chap-emoji">💼</div><div class="chap-num">01</div><div class="chap-title">IT 경영 성과관리</div><div class="chap-status">15개 개념</div></a><a href="./02/" class="chap-card" style="--main:#b45309;--sub:#78350f"><div class="chap-emoji">💼</div><div class="chap-num">02</div><div class="chap-title">개인정보 &amp; 윤리</div><div class="chap-status">5개 개념</div></a><a href="./03/" class="chap-card" style="--main:#b45309;--sub:#78350f"><div class="chap-emoji">💼</div><div class="chap-num">03</div><div class="chap-title">지식재산권</div><div class="chap-status">14개 개념</div></a><a href="./04/" class="chap-card" style="--main:#b45309;--sub:#78350f"><div class="chap-emoji">💼</div><div class="chap-num">04</div><div class="chap-title">스마트 비즈니스 인프라</div><div class="chap-status">27개 개념</div></a><a href="./05/" class="chap-card" style="--main:#b45309;--sub:#78350f"><div class="chap-emoji">💼</div><div class="chap-num">05</div><div class="chap-title">IT 비즈니스 혁신</div><div class="chap-status">26개 개념</div></a></div>
<div class="footer">챕터를 선택해 개념을 학습하세요</div>
</body>
</html>
